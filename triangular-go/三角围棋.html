<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>三角围棋</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: #2b5e3b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
        }

        .game-wrapper {
            background: #d9c8ac;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid #6b4a2e;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #8f6b4f;
            padding: 12px 20px;
            border-radius: 40px;
            color: #f9eed7;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 4px solid #4d2f1b;
            gap: 10px;
        }

        .left-group {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .side-select {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

            .side-select label {
                font-size: 1.1rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .side-select input {
                transform: scale(1.2);
                margin: 0;
            }

        .komi-info {
            background: #3e2e21;
            padding: 6px 20px;
            border-radius: 30px;
            color: #ffd966;
            font-size: 1rem;
            white-space: nowrap;
        }

        .color-status {
            background: #3e2e21;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffd966;
            white-space: nowrap;
        }

        .main-area {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 140px;
        }

        .ctrl-btn {
            background: #b88a4b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 8px;
            border-radius: 30px;
            font-size: 1rem;
            border-bottom: 5px solid #5e3e1e;
            cursor: pointer;
            transition: 0.08s;
            text-align: center;
        }

            .ctrl-btn:active {
                border-bottom-width: 2px;
                transform: translateY(3px);
            }

        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 0 0 auto;
            width: 100%;
            max-width: 600px;
        }

        canvas {
            display: block;
            background: transparent;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            max-width: 100%;
        }

        .info-panel {
            background: #8f6b4f;
            padding: 20px 16px;
            border-radius: 20px;
            color: #efdfbb;
            width: 100%;
            max-width: 280px;
            border: 1px solid #c9a450;
            margin: 0 auto;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            border-bottom: 4px solid #4d2f1b;
        }

        .turn-box {
            background: #3e2e21;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            color: #ffd966;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .score-box {
            background: #3e2e21;
            padding: 14px;
            border-radius: 16px;
            line-height: 1.6;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .score-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .score-content {
            min-height: 60px;
        }

        @media (max-width: 700px) {
            .game-wrapper {
                padding: 12px;
            }

            .button-panel {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
                margin: 10px 0 0 0;
                gap: 10px;
            }

                .button-panel .ctrl-btn {
                    width: calc(50% - 10px);
                    min-width: 120px;
                }

            .info-panel {
                max-width: 100%;
                margin-top: 10px;
            }

            .top-panel {
                padding: 10px 12px;
            }

            .left-group {
                gap: 15px;
            }

            .side-select label {
                font-size: 0.95rem;
            }

            .komi-info {
                white-space: normal;
                font-size: 0.9rem;
            }

            .color-status {
                white-space: normal;
                font-size: 0.9rem;
            }

            .board-container {
                max-width: 100%;
            }
        }

        .touch-device .mobile-actions {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="top-panel">
            <div class="left-group">
                <div class="side-select">
                    <label style="color: #b1d1fc;"><input type="radio" name="color" value="black" id="radioBlack"> ⚫ 黑方</label>
                    <label style="color: #ffeeaa;"><input type="radio" name="color" value="white" id="radioWhite"> ⚪ 白方</label>
                </div>
                <div class="komi-info">黑贴白 3.25</div>
            </div>
            <div class="color-status" id="colorStatus">未选择阵营</div>
        </div>

        <div class="main-area">
            <div class="button-panel">
                <button class="ctrl-btn" id="newGameBtn">🔄 新局</button>
                <button class="ctrl-btn" id="estimateBtn">📊 形势判断</button>
                <button class="ctrl-btn" id="passBtn">🚫 虚着</button>
                <button class="ctrl-btn" id="undoBtn">↩ 悔棋</button>
                <button class="ctrl-btn" id="resignBtn">🏳 认输</button>
                <button class="ctrl-btn" id="endReqBtn">⏹ 申请终局</button>
            </div>

            <div class="board-container">
                <canvas id="goBoard" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="turn-box" id="turnDisplay">　</div>
                <div class="score-box">
                    <div class="score-title" id="scoreTitle">　</div>
                    <div class="score-content">
                        <div id="scoreBoard">　</div>
                        <div id="leadInfo" style="margin-top:12px; color: #ffb870;">　</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= 正三角形参数 =================
        const ROWS = 27;
        const KOMI = 3.25;

        // 底边宽度（可适当调整，500 在600画布上留出边距）
        const BASE_WIDTH = 520;
        const CENTER_X = 300;                     // 画布水平中心

        // 等边三角形网格间距
        const DX = BASE_WIDTH / (ROWS - 1);        // 水平相邻点间距
        const DY = (Math.sqrt(3) / 2) * DX;        // 垂直相邻行间距（等边三角形高度方向）
        const TOTAL_HEIGHT = DY * (ROWS - 1);       // 整个三角形高度
        const TOP_Y = (600 - TOTAL_HEIGHT) / 2;     // 顶部y坐标（居中）
        const BOTTOM_Y = TOP_Y + TOTAL_HEIGHT;      // 底部y坐标

        // 触摸设备检测
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isMouseDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        document.body.classList.add(isTouchDevice ? 'touch-device' : 'no-touch');

        // 棋盘数据: board[r][c] (0空,1黑,2白)
        let board = Array(ROWS).fill().map((_, r) => Array(r + 1).fill(0));
        let currentPlayer = 1;        // 1:黑, 2:白
        let myColor = null;            // 'black' 或 'white'
        let isMyTurn = false;

        let hoverR = -1, hoverC = -1;
        let isHoverValid = false;

        // 历史局面存储
        let historyBoards = [];
        let historyBoardSet = new Set();

        let lastMoveMarkers = [];        // 最后一步标记 {row, col, color}
        let showEstimateActive = false;

        // 缓存形势判断结果
        let cachedLiveBoard = null;
        let cachedTerritory = null;

        let ws;

        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turnDisplay');
        const colorStatus = document.getElementById('colorStatus');
        const radioBlack = document.getElementById('radioBlack');
        const radioWhite = document.getElementById('radioWhite');
        const scoreTitle = document.getElementById('scoreTitle');
        const scoreBoard = document.getElementById('scoreBoard');
        const leadInfo = document.getElementById('leadInfo');

        // ----- 辅助函数 -----
        function formatScore(num) {
            let str = num.toFixed(2);
            str = str.replace(/\.?0+$/, '');
            return str;
        }

        function deepCopyBoard(src) {
            return src.map(row => row.slice());
        }

        function boardToString(board) {
            // 将三角形棋盘展平为字符串
            let parts = [];
            for (let r = 0; r < ROWS; r++) {
                parts.push(board[r].join(','));
            }
            return parts.join(';');
        }

        function rebuildHistorySet() {
            historyBoardSet.clear();
            historyBoards.forEach(b => historyBoardSet.add(boardToString(b)));
        }

        function isRepeatBoard(newBoard) {
            return historyBoardSet.has(boardToString(newBoard));
        }

        // ----- 坐标转换 (基于正三角形网格) -----
        function triCoordToPixel(r, c) {
            let y = TOP_Y + r * DY;
            let leftX = CENTER_X - (r * DX) / 2;
            let x = leftX + c * DX;
            return { x, y };
        }

        // 根据像素坐标找到最近的棋盘点
        function getClosestIntersection(px, py) {
            let minDist = Infinity;
            let bestR = -1, bestC = -1;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    let { x, y } = triCoordToPixel(r, c);
                    let dist = Math.hypot(px - x, py - y);
                    if (dist < minDist) {
                        minDist = dist;
                        bestR = r;
                        bestC = c;
                    }
                }
            }
            return { row: bestR, col: bestC };
        }

        // ----- 围棋规则 (与之前相同) -----
        const DIRS = [
            [0, 1],   // 右
            [0, -1],  // 左
            [1, 0],   // 下 (左斜向下)
            [-1, 0],  // 上 (左斜向上)
            [1, 1],   // 右下 (右斜向下)
            [-1, -1]  // 左上 (右斜向上)
        ];

        function isValidCoord(r, c) {
            return r >= 0 && r < ROWS && c >= 0 && c <= r;
        }

        function hasLiberty(board, row, col) {
            let color = board[row][col];
            if (color === 0) return false;
            let visited = Array(ROWS).fill().map(() => []);
            let queue = [[row, col]];
            visited[row][col] = true;

            while (queue.length) {
                let [r, c] = queue.shift();
                for (let [dr, dc] of DIRS) {
                    let nr = r + dr, nc = c + dc;
                    if (!isValidCoord(nr, nc)) continue;
                    if (board[nr][nc] === 0) return true; // 找到气
                    if (board[nr][nc] === color && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            return false;
        }

        function removeGroup(board, row, col, color) {
            let queue = [[row, col]];
            board[row][col] = 0;
            while (queue.length) {
                let [r, c] = queue.shift();
                for (let [dr, dc] of DIRS) {
                    let nr = r + dr, nc = c + dc;
                    if (isValidCoord(nr, nc) && board[nr][nc] === color) {
                        board[nr][nc] = 0;
                        queue.push([nr, nc]);
                    }
                }
            }
        }

        function tryPlaceStone(boardBefore, row, col, playerVal) {
            if (!isValidCoord(row, col) || boardBefore[row][col] !== 0) return null;
            let newBoard = deepCopyBoard(boardBefore);
            newBoard[row][col] = playerVal;

            // 先检查并移除对方无气块
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (newBoard[r][c] === 3 - playerVal && !hasLiberty(newBoard, r, c)) {
                        removeGroup(newBoard, r, c, 3 - playerVal);
                    }
                }
            }

            // 再检查己方（落子后可能导致己方无气，自杀禁止）
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (newBoard[r][c] === playerVal && !hasLiberty(newBoard, r, c)) {
                        return null;
                    }
                }
            }
            return newBoard;
        }

        // ----- 形势判断：移除所有无气块 -----
        function removeDeadGroups(srcBoard) {
            let boardCopy = deepCopyBoard(srcBoard);
            let changed = true;
            while (changed) {
                changed = false;
                let visited = Array(ROWS).fill().map(() => []);
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c <= r; c++) {
                        if (boardCopy[r][c] !== 0 && !visited[r][c]) {
                            let color = boardCopy[r][c];
                            let queue = [[r, c]];
                            visited[r][c] = true;
                            let stones = [[r, c]];
                            let hasLib = false;
                            let idx = 0;
                            while (idx < queue.length) {
                                let [rr, cc] = queue[idx++];
                                for (let [dr, dc] of DIRS) {
                                    let nr = rr + dr, nc = cc + dc;
                                    if (!isValidCoord(nr, nc)) continue;
                                    if (boardCopy[nr][nc] === 0) {
                                        hasLib = true;
                                    } else if (boardCopy[nr][nc] === color && !visited[nr][nc]) {
                                        visited[nr][nc] = true;
                                        queue.push([nr, nc]);
                                        stones.push([nr, nc]);
                                    }
                                }
                            }
                            if (!hasLib) {
                                for (let [rr, cc] of stones) {
                                    boardCopy[rr][cc] = 0;
                                }
                                changed = true;
                            }
                        }
                    }
                }
            }
            return boardCopy;
        }

        // 计算两点间的最短路径距离 (三角网格)
        function gridDistance(r1, c1, r2, c2) {
            let dr = r1 - r2;
            let dc = c1 - c2;
            return (Math.abs(dr) + Math.abs(dc) + Math.abs(dr + dc)) / 2;
        }

        // 更新形势缓存 (活子棋盘 + 领地归属)
        function updateEstimateData() {
            cachedLiveBoard = removeDeadGroups(board);

            let blackStones = [], whiteStones = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (cachedLiveBoard[r][c] === 1) blackStones.push([r, c]);
                    else if (cachedLiveBoard[r][c] === 2) whiteStones.push([r, c]);
                }
            }

            cachedTerritory = Array(ROWS).fill().map((_, r) => Array(r + 1).fill(0));

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (cachedLiveBoard[r][c] !== 0) continue;
                    let minDistBlack = Infinity, minDistWhite = Infinity;
                    for (let [br, bc] of blackStones) {
                        let d = gridDistance(r, c, br, bc);
                        if (d < minDistBlack) minDistBlack = d;
                    }
                    for (let [wr, wc] of whiteStones) {
                        let d = gridDistance(r, c, wr, wc);
                        if (d < minDistWhite) minDistWhite = d;
                    }
                    if (minDistBlack < minDistWhite) cachedTerritory[r][c] = 1;
                    else if (minDistWhite < minDistBlack) cachedTerritory[r][c] = 2;
                }
            }

            // 计算分数用于显示
            let blackTotal = blackStones.length;
            let whiteTotal = whiteStones.length;
            let blackTerritory = 0, whiteTerritory = 0, publicTerritory = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (cachedLiveBoard[r][c] !== 0) continue;
                    if (cachedTerritory[r][c] === 1) blackTerritory++;
                    else if (cachedTerritory[r][c] === 2) whiteTerritory++;
                    else publicTerritory++;
                }
            }
            blackTotal += blackTerritory + publicTerritory / 2;
            whiteTotal += whiteTerritory + publicTerritory / 2;

            let lead = blackTotal - whiteTotal - 2 * KOMI;
            scoreTitle.innerText = '🏆 形势';
            scoreBoard.innerText = `黑: ${formatScore(blackTotal)} | 白: ${formatScore(whiteTotal)}`;
            leadInfo.innerText = `黑${(lead >= 0 ? '+' : '') + formatScore(lead)}点`;
        }

        // 绘制形势标记 (死子小圆 + 空点归属小圆)
        function drawEstimateOverlay(liveBoard, territory) {
            const dotRadius = 3;

            // 死子标记
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (board[r][c] !== 0 && liveBoard[r][c] === 0) {
                        let { x, y } = triCoordToPixel(r, c);
                        ctx.beginPath();
                        ctx.arc(x, y, dotRadius, 0, 2 * Math.PI);
                        ctx.fillStyle = board[r][c] === 1 ? '#ffffff' : '#222222';
                        ctx.fill();
                    }
                }
            }

            // 空点归属
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (board[r][c] !== 0) continue;
                    let owner = territory[r][c];
                    if (owner === 0) continue;
                    let { x, y } = triCoordToPixel(r, c);
                    ctx.beginPath();
                    ctx.arc(x, y, dotRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = owner === 1 ? '#222222' : '#ffffff';
                    ctx.fill();
                }
            }
        }

        // 绘制基础棋盘
        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);

            // 外框三角形顶点
            const A = triCoordToPixel(0, 0);
            const B = triCoordToPixel(ROWS - 1, 0);
            const C = triCoordToPixel(ROWS - 1, ROWS - 1);

            // 三角形中心
            const centerX = (A.x + B.x + C.x) / 3;
            const centerY = (A.y + B.y + C.y) / 3;
            const margin = 30;

            const dirA = { x: A.x - centerX, y: A.y - centerY };
            const dirB = { x: B.x - centerX, y: B.y - centerY };
            const dirC = { x: C.x - centerX, y: C.y - centerY };
            const lenA = Math.hypot(dirA.x, dirA.y);
            const lenB = Math.hypot(dirB.x, dirB.y);
            const lenC = Math.hypot(dirC.x, dirC.y);
            const normA = { x: dirA.x / lenA, y: dirA.y / lenA };
            const normB = { x: dirB.x / lenB, y: dirB.y / lenB };
            const normC = { x: dirC.x / lenC, y: dirC.y / lenC };

            const outerA = { x: A.x + normA.x * margin, y: A.y + normA.y * margin };
            const outerB = { x: B.x + normB.x * margin, y: B.y + normB.y * margin };
            const outerC = { x: C.x + normC.x * margin, y: C.y + normC.y * margin };

            // 绘制外框三角形
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowOffsetY = 8;
            ctx.fillStyle = '#deb887';
            ctx.strokeStyle = '#6b4a2e';
            ctx.lineWidth = 1;
            const cornerRadius = 3;
            (function drawRoundedTriangle(vertices, radius) {
                if (vertices.length !== 3) return;
                const startPoints = [], endPoints = [];
                for (let i = 0; i < 3; i++) {
                    const curr = vertices[i];
                    const prev = vertices[(i - 1 + 3) % 3];
                    const next = vertices[(i + 1) % 3];
                    const v1 = { x: prev.x - curr.x, y: prev.y - curr.y };
                    const v2 = { x: next.x - curr.x, y: next.y - curr.y };
                    const len1 = Math.hypot(v1.x, v1.y);
                    const len2 = Math.hypot(v2.x, v2.y);
                    const dx1 = v1.x / len1, dy1 = v1.y / len1;
                    const dx2 = v2.x / len2, dy2 = v2.y / len2;
                    startPoints.push({ x: curr.x + dx1 * radius, y: curr.y + dy1 * radius });
                    endPoints.push({ x: curr.x + dx2 * radius, y: curr.y + dy2 * radius });
                }
                ctx.beginPath();
                ctx.moveTo(endPoints[2].x, endPoints[2].y);
                for (let i = 0; i < 3; i++) {
                    ctx.arcTo(vertices[i].x, vertices[i].y, endPoints[i].x, endPoints[i].y, radius);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            })([outerA, outerB, outerC], cornerRadius);

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 画网格线
            ctx.lineWidth = 1.2;
            ctx.strokeStyle = '#3a281c';

            for (let r = 0; r < ROWS; r++) {
                let start = triCoordToPixel(r, 0);
                let end = triCoordToPixel(r, r);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }
            for (let c = 0; c < ROWS; c++) {
                let start = triCoordToPixel(c, c);
                let end = triCoordToPixel(ROWS - 1, c);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }
            for (let s = 0; s < ROWS; s++) {
                let start = triCoordToPixel(s, 0);
                let end = triCoordToPixel(ROWS - 1, ROWS - 1 - s);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
            }

            // 星位
            const stars = [
                { r: 4, c: 2 }, { r: 24, c: 2 }, { r: 24, c: 22 },
                { r: 14, c: 2 }, { r: 14, c: 12 }, { r: 24, c: 12 }
            ];
            ctx.fillStyle = '#3a281c';
            stars.forEach(({ r, c }) => {
                let { x, y } = triCoordToPixel(r, c);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fill();
            });

            // 棋子
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= r; c++) {
                    if (board[r][c] === 0)
                        continue;

                    const radius = DX * 0.42;

                    let { x, y } = triCoordToPixel(r, c);
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowOffsetY = 2;

                    const gradient = ctx.createRadialGradient(x - 3, y - 3, radius * 0.2, x, y, radius * 1.2);
                    if (board[r][c] === 1) {
                        gradient.addColorStop(0, '#444');
                        gradient.addColorStop(0.6, '#222');
                        gradient.addColorStop(1, '#111');
                    } else {
                        gradient.addColorStop(0, '#fff');
                        gradient.addColorStop(0.5, '#eee');
                        gradient.addColorStop(1, '#aaa');
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                    ctx.beginPath();
                    ctx.arc(x - 3, y - 3, radius * 0.15, 0, 2 * Math.PI);
                    if (board[r][c] === 1)
                        ctx.fillStyle = '#444';
                    else
                        ctx.fillStyle = '#fff';
                    ctx.fill();
                }
            }

            // 最后一步标记
            const markSize = 7;
            lastMoveMarkers.forEach(({ row, col, color }) => {
                if (!isValidCoord(row, col)) return;
                let { x, y } = triCoordToPixel(row, col);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + markSize, y);
                ctx.lineTo(x, y + markSize);
                ctx.closePath();
                ctx.fillStyle = color === 1 ? '#ffffff' : '#222222';
                ctx.fill();
            });

            // 悬停预览
            if (isMouseDevice && isMyTurn && isHoverValid && hoverR >= 0 && hoverC >= 0 && board[hoverR][hoverC] === 0) {
                let { x, y } = triCoordToPixel(hoverR, hoverC);
                ctx.globalAlpha = 0.45;
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, 2 * Math.PI);
                ctx.fillStyle = myColor === 'black' ? '#222' : '#ddd';
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function drawBoardWithOverlay() {
            drawBoard();
            if (showEstimateActive && cachedLiveBoard && cachedTerritory) {
                drawEstimateOverlay(cachedLiveBoard, cachedTerritory);
            }
        }

        function showEstimate() {
            if (!showEstimateActive) {
                clearEstimate();
                return;
            }
            updateEstimateData();
            drawBoardWithOverlay();
        }

        function clearEstimate() {
            cachedLiveBoard = null;
            cachedTerritory = null;
            scoreTitle.innerText = '　';
            scoreBoard.innerText = '　';
            leadInfo.innerText = '　';
            drawBoard();
        }

        function updateTurn() {
            let totalHand = historyBoards.length + 1;
            let turnText = currentPlayer === 1 ? '⚫ 第' + totalHand + '手' : '⚪ 第' + totalHand + '手';
            turnDisplay.innerText = turnText;
            isMyTurn = (myColor === 'black' && currentPlayer === 1) || (myColor === 'white' && currentPlayer === 2);
            if (showEstimateActive) updateEstimateData();
            drawBoardWithOverlay();
        }

        function commitMove(row, col) {
            if (!isMyTurn) return false;
            if (!isValidCoord(row, col) || board[row][col] !== 0) return false;

            const playerVal = myColor === 'black' ? 1 : 2;
            let newBoard = tryPlaceStone(board, row, col, playerVal);
            if (!newBoard) {
                alert('非法落子');
                return false;
            }
            if (isRepeatBoard(newBoard)) {
                alert('禁全同：该局面已出现过');
                return false;
            }

            historyBoards.push(deepCopyBoard(board));
            historyBoardSet.add(boardToString(board));
            board = newBoard;
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            lastMoveMarkers = [{ row, col, color: playerVal }];
            if (showEstimateActive) updateEstimateData();
            updateTurn();

            ws.send(JSON.stringify({
                type: 'move',
                board: newBoard,
                nextPlayer: currentPlayer,
                lastMoveMarkers: lastMoveMarkers
            }));
            return true;
        }

        // ----- WebSocket 通信 (保持不变) -----
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/triangle-weiqi`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => console.log('已连接对弈服务器');
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };
            ws.onclose = () => {
                colorStatus.innerText = '连接断开，重连中...';
                setTimeout(connectWebSocket, 2000);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'init':
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    break;
                case 'colorAssigned':
                    myColor = msg.color;
                    colorStatus.innerText = `已选择: ${myColor === 'black' ? '黑方' : '白方'}`;
                    if (myColor === 'black') radioBlack.checked = true;
                    else radioWhite.checked = true;
                    updateTurn();
                    break;
                case 'colorTaken':
                    alert('该颜色已被占用');
                    break;
                case 'gameState':
                    board = msg.board;
                    currentPlayer = msg.currentPlayer;
                    historyBoards = msg.historyBoards || [];
                    rebuildHistorySet();
                    lastMoveMarkers = msg.lastMoveMarkers || [];
                    if (showEstimateActive) updateEstimateData();
                    drawBoardWithOverlay();
                    updateTurn();
                    break;
                case 'broadcast':
                    if (msg.action === 'move' || msg.action === 'pass') {
                        historyBoards.push(deepCopyBoard(board));
                        historyBoardSet.add(boardToString(board));
                        board = msg.board;
                        currentPlayer = msg.currentPlayer;
                        lastMoveMarkers = msg.lastMoveMarkers || [];
                        if (showEstimateActive) updateEstimateData();
                        drawBoardWithOverlay();
                        updateTurn();
                    } else if (msg.action === 'undoAccept') {
                        board = msg.board;
                        currentPlayer = msg.currentPlayer;
                        historyBoards = msg.historyBoards || [];
                        rebuildHistorySet();
                        lastMoveMarkers = msg.lastMoveMarkers || [];
                        if (showEstimateActive) updateEstimateData();
                        drawBoardWithOverlay();
                        updateTurn();
                    } else if (msg.action === 'endAgreed') {
                        // 简单提示，实际分数已在服务器端计算？此处仅作演示
                        alert('对局结束，双方同意终局');
                    } else if (msg.action === 'resign') {
                        alert(`${msg.player} 认输，对局结束`);
                        lastMoveMarkers = [];
                        drawBoardWithOverlay();
                    }
                    break;
                case 'newGame':
                    board = msg.board;
                    currentPlayer = msg.currentPlayer;
                    lastMoveMarkers = msg.lastMoveMarkers || [];
                    historyBoards = [];
                    historyBoardSet.clear();
                    myColor = null;
                    radioBlack.checked = false;
                    radioWhite.checked = false;
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    colorStatus.innerText = '未选择阵营';
                    showEstimateActive = false;
                    clearEstimate();
                    drawBoardWithOverlay();
                    updateTurn();
                    break;
                case 'undoRequest':
                    if (confirm('对方请求悔棋，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: false }));
                    }
                    break;
                case 'endRequest':
                    if (confirm('对方申请终局并数点，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: false }));
                    }
                    break;
            }
        }

        canvas.addEventListener('click', (e) => {
            if (!isMyTurn) return;
            const rect = canvas.getBoundingClientRect();
            const scale = 600 / rect.width;
            const x = (e.clientX - rect.left) * scale;
            const y = (e.clientY - rect.top) * scale;
            const { row, col } = getClosestIntersection(x, y);
            commitMove(row, col);
        });
        if (isMouseDevice) {
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scale = 600 / rect.width;
                const x = (e.clientX - rect.left) * scale;
                const y = (e.clientY - rect.top) * scale;
                const { row, col } = getClosestIntersection(x, y);
                hoverR = row;
                hoverC = col;
                isHoverValid = true;
                drawBoardWithOverlay();
            });
            canvas.addEventListener('mouseleave', () => {
                isHoverValid = false;
                hoverR = -1; hoverC = -1;
                drawBoardWithOverlay();
            });
        }

        document.getElementById('newGameBtn').addEventListener('click', () => {
            if (confirm('确定开始新的一局吗？')) {
                ws.send(JSON.stringify({ type: 'newGame' }));
            }
        });

        document.getElementById('estimateBtn').addEventListener('click', () => {
            showEstimateActive = !showEstimateActive;
            if (showEstimateActive) {
                showEstimate();
            } else {
                clearEstimate();
            }
        });

        document.getElementById('passBtn').addEventListener('click', () => {
            if (!isMyTurn) return;
            historyBoards.push(deepCopyBoard(board));
            historyBoardSet.add(boardToString(board));
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            lastMoveMarkers = [];
            if (showEstimateActive) updateEstimateData();
            updateTurn();

            ws.send(JSON.stringify({ type: 'pass', player: myColor }));
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'undoRequest' }));
        });

        document.getElementById('resignBtn').addEventListener('click', () => {
            if (confirm('确定认输吗？')) ws.send(JSON.stringify({ type: 'resign', player: myColor }));
        });

        document.getElementById('endReqBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'endRequest' }));
        });

        radioBlack.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'black' }));
        });

        radioWhite.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'white' }));
        });

        connectWebSocket();
    </script>
</body>
