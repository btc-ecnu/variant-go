<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>六角围棋</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: #2b5e3b;
            display: flex;

            align-items: center;

            padding: 6px 20px;

        .color-status {
            background: #3e2e21;

        .main-area {
            display: flex;

        .button-panel {

        .ctrl-btn {

        .board-container {
            display: flex;

        canvas {
            display: block;

        .info-panel {
            background: #8f6b4f;
            padding: 20px 16px;

            width: 100%;

        .turn-box {

        @media (max-width: 700px) {

            }

            }

            .left-group {
                gap: 15px;
            }

            .side-select label {
                font-size: 0.95rem;
            }

            .komi-info {
                white-space: normal;
                font-size: 0.9rem;
            }

            .color-status {
                white-space: normal;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="top-panel">
            <div class="left-group">
                <div class="side-select">
                    <label style="color: #b1d1fc;"><input type="radio" name="color" value="black" id="radioBlack"> ⚫ 黑方</label>
                    <label style="color: #ffeeaa;"><input type="radio" name="color" value="white" id="radioWhite"> ⚪ 白方</label>
                </div>
                <div class="komi-info">黑贴白3.25点</div>
            </div>

        </div>

        <div class="main-area">
            <div class="button-panel">
                <button class="ctrl-btn" id="newGameBtn">🔄 新局</button>
                <button class="ctrl-btn" id="estimateBtn">📊 形势判断</button>
                <button class="ctrl-btn" id="passBtn">🚫 虚着</button>

            </div>

            <div class="board-container">
                <canvas id="goBoard" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="turn-box" id="turnDisplay">　</div>
                <div class="score-box">
                    <div class="score-title"  id="scoreTitle">　</div>
                    <div class="score-content">
                        <div id="scoreBoard">　</div>
                        <div id="leadInfo" style="margin-top:12px; color: #ffb870;">　</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateHexBoard() {
            const R = 2;
            const sqrt3 = Math.sqrt(3);
            const layers = [
                { L: 1, count: 1 },
                { L: 1.5, count: 2 },
                { L: 2, count: 3 },
                { L: 2.5, count: 4 },
                { L: 3, count: 5 },
                { L: 3.5, count: 6 },
                { L: 4, count: 7 },
                { L: 4.5, count: 8 },
                { L: 5, count: 7 },
                { L: 5.5, count: 8 },
                { L: 6, count: 7 },
                { L: 6.5, count: 8 },
                { L: 7, count: 7 },
                { L: 7.5, count: 8 },
                { L: 8, count: 7 },
                { L: 8.5, count: 8 },
                { L: 9, count: 7 },
                { L: 9.5, count: 8 },
                { L: 10, count: 7 },
                { L: 10.5, count: 8 },
                { L: 11, count: 7 },
                { L: 11.5, count: 8 },
                { L: 12, count: 7 },
                { L: 12.5, count: 6 },
                { L: 13, count: 5 },
                { L: 13.5, count: 4 },
                { L: 14, count: 3 },
                { L: 14.5, count: 2 },
                { L: 15, count: 1 }
            ];

            const vertexMap = new Map();
            const vertices = [];
            const hexagons = [];

            const dx = [R, R / 2, -R / 2, -R, -R / 2, R / 2];
            const dy = [0, R * sqrt3 / 2, R * sqrt3 / 2, 0, -R * sqrt3 / 2, -R * sqrt3 / 2];

            for (let layer of layers) {
                const L = layer.L;
                const n = layer.count;
                const cy = (L - 1) * R * sqrt3;
                for (let i = 0; i < n; i++) {
                    const cx = 3 * (- (n - 1) + 2 * i);
                    const hexIds = [];
                    for (let j = 0; j < 6; j++) {
                        const x = cx + dx[j];
                        const y = cy + dy[j];
                        const key = `${Math.round(x * 100) / 100},${Math.round(y * 100) / 100}`;
                        if (!vertexMap.has(key)) {
                            const id = vertices.length;
                            vertexMap.set(key, id);
                            vertices.push({ x, y });
                            hexIds.push(id);
                        } else {
                            hexIds.push(vertexMap.get(key));
                        }
                    }
                    hexagons.push(hexIds);
                }
            }

            for (let i = 0; i < vertices.length; i++) {
                const { x, y } = vertices[i];
                vertices[i] = { x: -y, y: x };
            }

            const V = vertices.length;
            console.log('前端顶点数:', V);

            // 邻居关系
            const neighbors = Array.from({ length: V }, () => new Set());
            for (let hex of hexagons) {
                for (let i = 0; i < 6; i++) {
                    const a = hex[i];
                    const b = hex[(i + 1) % 6];
                    if (a !== b) {
                        neighbors[a].add(b);
                        neighbors[b].add(a);
                    }
                }
            }
            const neighborList = neighbors.map(set => Array.from(set));

            // 计算旋转后的坐标范围
            let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
            vertices.forEach(v => {
                xMin = Math.min(xMin, v.x);
                xMax = Math.max(xMax, v.x);
                yMin = Math.min(yMin, v.y);
                yMax = Math.max(yMax, v.y);
            });

            const padding = 35;
            const canvasSize = 600;
            const scaleX = (canvasSize - 2 * padding) / (xMax - xMin);
            const scaleY = (canvasSize - 2 * padding) / (yMax - yMin);
            const scale = Math.min(scaleX, scaleY);
            const offsetX = (canvasSize - (xMax - xMin) * scale) / 2 - xMin * scale;
            const offsetY = (canvasSize - (yMax - yMin) * scale) / 2 - yMin * scale;

            // 变换顶点坐标
            const transformed = vertices.map(v => ({
                x: v.x * scale + offsetX,
                y: v.y * scale + offsetY
            }));

            // 计算平均边长
            let totalDist = 0;
            let edgeCount = 0;
            for (let hex of hexagons) {
                for (let i = 0; i < 6; i++) {
                    const a = hex[i];
                    const b = hex[(i + 1) % 6];
                    const dx = transformed[a].x - transformed[b].x;
                    const dy = transformed[a].y - transformed[b].y;
                    totalDist += Math.sqrt(dx * dx + dy * dy);
                    edgeCount++;
                }
            }
            const cellSize = totalDist / edgeCount;
            const clickThreshold = cellSize * 0.4;

            // 边界顶点（度数<3）
            const boundaryVertices = [];
            for (let i = 0; i < V; i++) {
                if (neighborList[i].length < 3) boundaryVertices.push(i);
            }
            const centerX = transformed.reduce((sum, p) => sum + p.x, 0) / V;
            const centerY = transformed.reduce((sum, p) => sum + p.y, 0) / V;
            boundaryVertices.sort((a, b) => {
                const pa = transformed[a], pb = transformed[b];
                const angleA = Math.atan2(pa.y - centerY, pa.x - centerX);
                const angleB = Math.atan2(pb.y - centerY, pb.x - centerX);
                return angleA - angleB;
            });

            return {
                vertexCount: V,
                transformed,
                neighborList,
                hexagons,
                boundaryVertices,
                clickThreshold,
                cellSize,
                centerX,
                centerY
            };
        }
        const hexData = generateHexBoard();
        const V = hexData.vertexCount;
        const transformed = hexData.transformed;
        const neighbors = hexData.neighborList;
        const hexagons = hexData.hexagons;
        const boundaryVerts = hexData.boundaryVertices;
        const clickThreshold = hexData.clickThreshold;
        const cellSize = hexData.cellSize;
        const centerX = hexData.centerX;
        const centerY = hexData.centerY;

        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isMouseDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        document.body.classList.add(isTouchDevice ? 'touch-device' : 'no-touch');

        // ==================== 游戏状态 ====================
        let board = Array(V).fill(0);
        let currentPlayer = 1;
        let myColor = null;
        let isMyTurn = false;

        let hoverVertex = -1;
        let isHoverValid = false;

        let historyBoards = [];
        let historyBoardSet = new Set();

        let lastMoveMarkers = [];
        let showEstimateActive = false;

        // 缓存形势判断结果
        let cachedLiveBoard = null;
        let cachedTerritory = null;

        let ws;
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turnDisplay');
        const colorStatus = document.getElementById('colorStatus');
        const radioBlack = document.getElementById('radioBlack');
        const radioWhite = document.getElementById('radioWhite');
        const scoreTitle = document.getElementById('scoreTitle');
        const scoreBoard = document.getElementById('scoreBoard');
        const leadInfo = document.getElementById('leadInfo');

        // 工具函数
        const KOMI = 3.25; // 贴点

        function formatScore(num) {
            let str = num.toFixed(2);
            return str.replace(/\.?0+$/, '');
        }

        function deepCopyBoard(src) { return src.slice(); }

        function boardToString(board) {
            return board.join(',');
        }

        function rebuildHistorySet() {
            historyBoardSet.clear();
            historyBoards.forEach(b => historyBoardSet.add(boardToString(b)));
        }

        function isRepeatBoard(newBoard) {
            return historyBoardSet.has(boardToString(newBoard));
        }

        // 气计算
        function hasLiberty(boardState, start, visited = null) {
            const color = boardState[start];
            if (color === 0) return false;
            const queue = [start];
            const visitedLocal = visited || new Array(V).fill(false);
            visitedLocal[start] = true;
            let idx = 0;
            while (idx < queue.length) {
                const v = queue[idx++];
                for (let nb of neighbors[v]) {
                    if (boardState[nb] === 0) return true;
                    if (boardState[nb] === color && !visitedLocal[nb]) {
                        visitedLocal[nb] = true;
                        queue.push(nb);
                    }
                }
            }
            return false;
        }

        function removeGroup(boardState, start) {
            const color = boardState[start];
            if (color === 0) return;
            const queue = [start];
            boardState[start] = 0;
            let idx = 0;
            while (idx < queue.length) {
                const v = queue[idx++];
                for (let nb of neighbors[v]) {
                    if (boardState[nb] === color) {
                        boardState[nb] = 0;
                        queue.push(nb);
                    }
                }
            }
        }

        function tryPlaceStone(boardBefore, vertex, playerVal) {
            if (boardBefore[vertex] !== 0) return null;
            let newBoard = deepCopyBoard(boardBefore);
            newBoard[vertex] = playerVal;

            // 移除对方无气棋子
            for (let v = 0; v < V; v++) {
                if (newBoard[v] === 3 - playerVal && !hasLiberty(newBoard, v)) {
                    removeGroup(newBoard, v);
                }
            }

            // 检查己方刚落子是否有气
            if (!hasLiberty(newBoard, vertex)) return null;

            return newBoard;
        }

        // 判断一个空点（气点）是否被对方棋子邻接
        function isLibertySurroundedByOpponent(boardState, libertyVertex, opponentColor) {
            for (let nb of neighbors[libertyVertex]) {
                if (boardState[nb] === opponentColor) return true;
            }
            return false;
        }

        // 增强死子判定：迭代移除无气块 + 低气（≤2）且气点被对方完全包围的块
        function removeDeadAndDying(srcBoard) {
            let newBoard = deepCopyBoard(srcBoard);
            let changed = true;
            while (changed) {
                changed = false;
                let visited = new Array(V).fill(false);

                for (let v = 0; v < V; v++) {
                    if (newBoard[v] !== 0 && !visited[v]) {
                        let color = newBoard[v];
                        // BFS收集同色块
                        let queue = [v];
                        visited[v] = true;
                        let stones = [v];
                        let liberties = new Set(); // 存放气点索引
                        let idx = 0;
                        while (idx < queue.length) {
                            let cur = queue[idx++];
                            for (let nb of neighbors[cur]) {
                                if (newBoard[nb] === 0) {
                                    liberties.add(nb);
                                } else if (newBoard[nb] === color && !visited[nb]) {
                                    visited[nb] = true;
                                    queue.push(nb);
                                    stones.push(nb);
                                }
                            }
                        }

                        // 阶段1：无气块直接移除
                        if (liberties.size === 0) {
                            for (let s of stones) {
                                newBoard[s] = 0;
                            }
                            changed = true;
                            continue;
                        }

                        // 阶段2：有气但气数≤2且所有气点被对方包围，视为死子
                        if (liberties.size <= 2) {
                            let allLibertiesControlled = true;
                            for (let lib of liberties) {
                                if (!isLibertySurroundedByOpponent(newBoard, lib, 3 - color)) {
                                    allLibertiesControlled = false;
                                    break;
                                }
                            }
                            if (allLibertiesControlled) {
                                for (let s of stones) {
                                    newBoard[s] = 0;
                                }
                                changed = true;
                            }
                        }
                    }
                }
            }
            return newBoard;
        }

        // 多源BFS计算每个顶点到最近黑/白活子的距离（图距离）
        function multiSourceBFS(liveBoard, color) {
            let dist = new Array(V).fill(Infinity);
            let queue = [];
            for (let v = 0; v < V; v++) {
                if (liveBoard[v] === color) {
                    dist[v] = 0;
                    queue.push(v);
                }
            }
            let head = 0;
            while (head < queue.length) {
                let cur = queue[head++];
                for (let nb of neighbors[cur]) {
                    if (dist[nb] > dist[cur] + 1) {
                        dist[nb] = dist[cur] + 1;
                        queue.push(nb);
                    }
                }
            }
            return dist;
        }

        // 分配领地：基于最近距离，相等则平分
        function assignTerritory(liveBoard) {
            let territory = new Array(V).fill(0); // 0:未分配,1:黑,2:白,3:平分
            let blackCount = 0, whiteCount = 0;
            for (let v = 0; v < V; v++) {
                if (liveBoard[v] === 1) blackCount++;
                else if (liveBoard[v] === 2) whiteCount++;
            }

            // 如果某颜色没有活子，则所有空点归对方
            if (blackCount === 0 && whiteCount === 0) return territory; 
            if (blackCount === 0) {
                for (let v = 0; v < V; v++) if (liveBoard[v] === 0) territory[v] = 2;
                return territory;
            }
            if (whiteCount === 0) {
                for (let v = 0; v < V; v++) if (liveBoard[v] === 0) territory[v] = 1;
                return territory;
            }

            let distBlack = multiSourceBFS(liveBoard, 1);
            let distWhite = multiSourceBFS(liveBoard, 2);

            for (let v = 0; v < V; v++) {
                if (liveBoard[v] !== 0) continue; // 只处理空点
                if (distBlack[v] < distWhite[v]) territory[v] = 1;
                else if (distWhite[v] < distBlack[v]) territory[v] = 2;
                else territory[v] = 3; // 距离相等，平分
            }
            return territory;
        }

        // 计算分数
        function computeScore(liveBoard, territory) {
            let blackStones = 0, whiteStones = 0;
            let blackTerritory = 0, whiteTerritory = 0, publicTerritory = 0;
            for (let v = 0; v < V; v++) {
                if (liveBoard[v] === 1) blackStones++;
                else if (liveBoard[v] === 2) whiteStones++;
                else {
                    if (territory[v] === 1) blackTerritory++;
                    else if (territory[v] === 2) whiteTerritory++;
                    else if (territory[v] === 3) publicTerritory++;
                }
            }
            let blackTotal = blackStones + blackTerritory + publicTerritory / 2;
            let whiteTotal = whiteStones + whiteTerritory + publicTerritory / 2;
            return { blackTotal, whiteTotal };
        }

        // 对外接口：从原始棋盘直接计算分数
        function computeScoreFromBoard(srcBoard) {
            let liveBoard = removeDeadAndDying(srcBoard);
            let territory = assignTerritory(liveBoard);
            return computeScore(liveBoard, territory);
        }

        // ==================== 绘制圆角六边形 ====================
        function drawRoundedHexagon(ctx, vertices, radius) {
            if (vertices.length !== 6) return;
            // 计算每条边上距离顶点 radius 的点（起点和终点）
            const startPoints = [];
            const endPoints = [];
            for (let i = 0; i < 6; i++) {
                const curr = vertices[i];
                const prev = vertices[(i - 1 + 6) % 6];
                const next = vertices[(i + 1) % 6];

                // 从当前顶点到前一个顶点的方向向量（指向顶点）
                const v1 = { x: prev.x - curr.x, y: prev.y - curr.y };
                // 从当前顶点到后一个顶点的方向向量（指向顶点）
                const v2 = { x: next.x - curr.x, y: next.y - curr.y };

                const len1 = Math.hypot(v1.x, v1.y);
                const len2 = Math.hypot(v2.x, v2.y);
                const dx1 = v1.x / len1;
                const dy1 = v1.y / len1;
                const dx2 = v2.x / len2;
                const dy2 = v2.y / len2;

                startPoints.push({ x: curr.x + dx1 * radius, y: curr.y + dy1 * radius });
                endPoints.push({ x: curr.x + dx2 * radius, y: curr.y + dy2 * radius });
            }

            ctx.beginPath();
            ctx.moveTo(startPoints[0].x, startPoints[0].y);
            for (let i = 0; i < 6; i++) {
                ctx.arcTo(vertices[i].x, vertices[i].y, endPoints[i].x, endPoints[i].y, radius);
                if (i < 5) {
                    ctx.lineTo(startPoints[i + 1].x, startPoints[i + 1].y);
                }
            }
            ctx.lineTo(startPoints[0].x, startPoints[0].y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        // 绘制形势叠加层（死子标记 + 领地归属点）—— 使用方形
        function drawEstimateOverlay(liveBoard, territory) {
            const markSize = cellSize * 0.2; // 方形半宽
            // 1. 死子标记：黑子死子用白方，白子死子用黑方
            for (let v = 0; v < V; v++) {
                if (board[v] !== 0 && liveBoard[v] === 0) {
                    let { x, y } = transformed[v];
                    ctx.fillStyle = board[v] === 1 ? '#ffffff' : '#222222';
                    ctx.fillRect(x - markSize, y - markSize, markSize * 2, markSize * 2);
                }
            }
            // 2. 领地归属点（只画在空点上，且排除平分点）
            for (let v = 0; v < V; v++) {
                if (board[v] !== 0) continue;
                let owner = territory[v];
                if (owner === 0 || owner === 3) continue;
                ctx.fillStyle = owner === 1 ? '#222' : '#f0f0f0';
                let { x, y } = transformed[v];
                ctx.fillRect(x - markSize, y - markSize, markSize * 2, markSize * 2);
            }
        }

        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);

            // 1. 计算中心到最远顶点的距离，用于生成正六边形外框
            let maxDist = 0;
            for (let v of transformed) {
                const dx = v.x - centerX;
                const dy = v.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > maxDist) maxDist = dist;
            }
            const outerR = maxDist + 1.2 * cellSize; // 扩大间距

            const angles = [0, 60, 120, 180, 240, 300].map(deg => deg * Math.PI / 180);
            const outerVerts = angles.map(angle => ({
                x: centerX + outerR * Math.cos(angle),
                y: centerY + outerR * Math.sin(angle)
            }));

            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
            ctx.fillStyle = '#deb887';
            ctx.strokeStyle = '#6b4a2e';
            ctx.lineWidth = 1;
            const cornerRadius = cellSize * 0.4;
            drawRoundedHexagon(ctx, outerVerts, cornerRadius);

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 2. 绘制所有六边形的边
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#3a281c';
            ctx.lineJoin = 'miter';
            for (let hex of hexagons) {
                for (let i = 0; i < 6; i++) {
                    const a = hex[i];
                    const b = hex[(i + 1) % 6];
                    ctx.beginPath();
                    ctx.moveTo(transformed[a].x, transformed[a].y);
                    ctx.lineTo(transformed[b].x, transformed[b].y);
                    ctx.stroke();
                }
            }

            // 3. 绘制棋子
            for (let v = 0; v < V; v++)
            {
                if (board[v] === 0)
                    continue;

                const radius = cellSize * 0.44;

                const { x, y } = transformed[v];
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowOffsetY = 2;

                const gradient = ctx.createRadialGradient(x - 3, y - 3, radius * 0.2, x, y, radius * 1.2);
                if (board[v] === 1) {
                    gradient.addColorStop(0, '#444');
                    gradient.addColorStop(0.6, '#222');
                    gradient.addColorStop(1, '#111');
                } else {
                    gradient.addColorStop(0, '#fff');
                    gradient.addColorStop(0.5, '#eee');
                    gradient.addColorStop(1, '#aaa');
                }
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                ctx.beginPath();
                ctx.arc(x - 3, y - 3, radius * 0.15, 0, 2 * Math.PI);
                if (board[v] === 1)
                    ctx.fillStyle = '#444';
                else
                    ctx.fillStyle = '#fff';
                ctx.fill();
            }

            // 4. 绘制最后一步标记
            const markSize = cellSize * 0.3;
            lastMoveMarkers.forEach(({ vertex, color }) => {
                if (vertex === undefined) return;
                const { x, y } = transformed[vertex];
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + markSize, y);
                ctx.lineTo(x, y + markSize);
                ctx.closePath();
                ctx.fillStyle = color === 1 ? '#fff' : '#222';
                ctx.fill();
            });

            // 5. 悬停预览
            if (!('ontouchstart' in window) && isMyTurn && isHoverValid && hoverVertex >= 0 && board[hoverVertex] === 0) {
                const { x, y } = transformed[hoverVertex];
                ctx.globalAlpha = 0.45;
                ctx.beginPath();
                ctx.arc(x, y, cellSize * 0.42, 0, 2 * Math.PI);
                ctx.fillStyle = myColor === 'black' ? '#222' : '#ddd';
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            // 6. 如果形势判断激活，绘制叠加层
            if (showEstimateActive && cachedLiveBoard && cachedTerritory) {
                drawEstimateOverlay(cachedLiveBoard, cachedTerritory);
            }
        }

        // 形势判断显示
        function showEstimate() {
            if (!showEstimateActive) {
                clearEstimate();
                return;
            }
            cachedLiveBoard = removeDeadAndDying(board);
            cachedTerritory = assignTerritory(cachedLiveBoard);
            let { blackTotal, whiteTotal } = computeScore(cachedLiveBoard, cachedTerritory);
            let lead = blackTotal - whiteTotal - 2 * KOMI; // 与标准围棋保持一致
            let leadStr = (lead >= 0 ? '+' : '') + formatScore(lead);
            scoreTitle.innerText = '🏆 形势';
            scoreBoard.innerText = `黑: ${formatScore(blackTotal)} | 白: ${formatScore(whiteTotal)}`;
            leadInfo.innerText = `黑${leadStr}点`;
            drawBoard();
        }

        function clearEstimate() {
            cachedLiveBoard = null;
            cachedTerritory = null;
            scoreTitle.innerText = '　';
            scoreBoard.innerText = '　';
            leadInfo.innerText = '　';
            drawBoard();
        }

        function updateTurn() {
            let totalHand = historyBoards.length + 1;
            turnDisplay.innerText = (currentPlayer === 1 ? '⚫ 第' + totalHand + '手' : '⚪ 第' + totalHand + '手');
            isMyTurn = (myColor === 'black' && currentPlayer === 1) || (myColor === 'white' && currentPlayer === 2);
            drawBoard();
        }

        // ==================== WebSocket ====================
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/hexagon-weiqi`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => console.log('已连接');
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };
            ws.onclose = () => {
                colorStatus.innerText = '连接断开，重连中...';
                setTimeout(connectWebSocket, 2000);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'init':
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    break;
                case 'colorAssigned':
                    myColor = msg.color;
                    colorStatus.innerText = `已选择: ${myColor === 'black' ? '黑方' : '白方'}`;
                    updateTurn();
                    break;
                case 'colorTaken':
                    alert('该颜色已被占用');
                    break;
                case 'gameState':
                    board = msg.board;
                    currentPlayer = msg.currentPlayer;
                    historyBoards = msg.historyBoards || [];
                    lastMoveMarkers = msg.lastMoveMarkers || [];
                    if (showEstimateActive) {
                        cachedLiveBoard = removeDeadAndDying(board);
                        cachedTerritory = assignTerritory(cachedLiveBoard);
                        let { blackTotal, whiteTotal } = computeScore(cachedLiveBoard, cachedTerritory);
                        let lead = blackTotal - whiteTotal - 2 * KOMI;
                        scoreBoard.innerText = `黑: ${formatScore(blackTotal)} | 白: ${formatScore(whiteTotal)}`;
                        leadInfo.innerText = `黑${(lead >= 0 ? '+' : '') + formatScore(lead)}点`;
                    }
                    drawBoard();
                    updateTurn();
                    break;
                case 'broadcast':
                    if (msg.action === 'move' || msg.action === 'pass' || msg.action === 'undoAccept') {
                        board = msg.board;
                        currentPlayer = msg.currentPlayer;
                        historyBoards = msg.historyBoards;
                        historyBoardSet.add(boardToString(board));
                        lastMoveMarkers = msg.lastMoveMarkers || [];
                        if (showEstimateActive) {
                            cachedLiveBoard = removeDeadAndDying(board);
                            cachedTerritory = assignTerritory(cachedLiveBoard);
                            let { blackTotal, whiteTotal } = computeScore(cachedLiveBoard, cachedTerritory);
                            let lead = blackTotal - whiteTotal - 2 * KOMI;
                            scoreBoard.innerText = `黑: ${formatScore(blackTotal)} | 白: ${formatScore(whiteTotal)}`;
                            leadInfo.innerText = `黑${(lead >= 0 ? '+' : '') + formatScore(lead)}点`;
                        }
                        drawBoard();
                        updateTurn();
                    } else if (msg.action === 'endAgreed') {
                        let { blackTotal, whiteTotal } = computeScoreFromBoard(board);
                        let lead = blackTotal - whiteTotal - 2 * KOMI;
                        let winner = lead > 0 ? '黑胜' : '白胜';
                        alert(`对局结束！\n黑: ${formatScore(blackTotal)} 白: ${formatScore(whiteTotal)} (贴${KOMI})\n${winner}`);
                    } else if (msg.action === 'resign') {
                        alert(`${msg.player} 认输`);
                    }
                    break;
                case 'newGame':
                    board = msg.board; // 空棋盘
                    currentPlayer = msg.currentPlayer; // 1
                    lastMoveMarkers = msg.lastMoveMarkers || []; // 空
                    historyBoards = [];
                    historyBoardSet.clear();
                    myColor = null;
                    // 重置颜色选择UI
                    radioBlack.checked = false;
                    radioWhite.checked = false;
                    radioBlack.disabled = msg.blackTaken; // false
                    radioWhite.disabled = msg.whiteTaken; // false
                    colorStatus.innerText = '未选择阵营';
                    // 关闭形势判断
                    showEstimateActive = false;
                    clearEstimate(); // 清空分数显示并重绘
                    drawBoard();
                    updateTurn();
                    break;
                case 'undoRequest':
                    if (confirm('对方请求悔棋，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: false }));
                    }
                    break;
                case 'endRequest':
                    if (confirm('对方申请终局，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: false }));
                    }
                    break;
            }
        }

        function commitMove(vertex) {
            if (!isMyTurn) return false;
            if (board[vertex] !== 0) return false;
            const playerVal = myColor === 'black' ? 1 : 2;
            let newBoard = tryPlaceStone(board, vertex, playerVal);
            if (!newBoard) return false;
            if (isRepeatBoard(newBoard)) {
                alert('禁全同');
                return false;
            }
            let markers = [{ vertex, color: playerVal }];
            lastMoveMarkers = markers;
            let nextPlayer = currentPlayer === 1 ? 2 : 1;
            historyBoards.push(deepCopyBoard(board));
            historyBoardSet.add(boardToString(board));
            board = newBoard;
            ws.send(JSON.stringify({
                type: 'move',
                board: newBoard,
                nextPlayer: nextPlayer,
                historyBoards: historyBoards,
                lastMoveMarkers: markers
            }));
            return true;
        }

        function getNearestVertex(x, y) {
            let minDist = Infinity;
            let best = -1;
            for (let v = 0; v < V; v++) {
                const { x: vx, y: vy } = transformed[v];
                const dx = vx - x, dy = vy - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) {
                    minDist = dist;
                    best = v;
                }
            }
            if (minDist < clickThreshold) return best;
            return -1;
        }

        canvas.addEventListener('click', (e) => {
            if (!isMyTurn) return;
            const rect = canvas.getBoundingClientRect();
            const scale = 600 / rect.width;
            const x = (e.clientX - rect.left) * scale;
            const y = (e.clientY - rect.top) * scale;
            const v = getNearestVertex(x, y);
            if (v !== -1) commitMove(v);
        });
        if (isMouseDevice) {
            canvas.addEventListener('mousemove', (e) => {
                if ('ontouchstart' in window) return;
                const rect = canvas.getBoundingClientRect();
                const scale = 600 / rect.width;
                const x = (e.clientX - rect.left) * scale;
                const y = (e.clientY - rect.top) * scale;
                const v = getNearestVertex(x, y);
                hoverVertex = v;
                isHoverValid = (v !== -1);
                drawBoard();
            });
            canvas.addEventListener('mouseleave', () => {
                hoverVertex = -1;
                isHoverValid = false;
                drawBoard();
            });
        }


        // 触摸事件支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isMyTurn) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scale = 600 / rect.width;
            const x = (touch.clientX - rect.left) * scale;
            const y = (touch.clientY - rect.top) * scale;
            const v = getNearestVertex(x, y);
            if (v !== -1) commitMove(v);
        });

        // 按钮事件
        document.getElementById('newGameBtn').addEventListener('click', () => {
            if (confirm('确定开始新的一局吗？')) {
                ws.send(JSON.stringify({ type: 'newGame' }));
            }
        });
        document.getElementById('estimateBtn').addEventListener('click', () => {
            showEstimateActive = !showEstimateActive;
            if (showEstimateActive) showEstimate(); else clearEstimate();
        });
        document.getElementById('passBtn').addEventListener('click', () => {
            if (!isMyTurn)
                return;
            historyBoards.push(deepCopyBoard(board));
            historyBoardSet.add(boardToString(board));
            ws.send(JSON.stringify({ type: 'pass', player: myColor }));
        });
        document.getElementById('undoBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'undoRequest' }));
        });
        document.getElementById('resignBtn').addEventListener('click', () => {
            if (confirm('认输？')) ws.send(JSON.stringify({ type: 'resign', player: myColor }));
        });
        document.getElementById('endReqBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'endRequest' }));
        });
        radioBlack.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'black' }));
        });
        radioWhite.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'white' }));
        });

        connectWebSocket();
    </script>
</body>
