<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>不稳定围棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 大厅容器 -->
    <div class="game-wrapper" id="lobbyContainer">
        <div class="lobby-area">
            <div class="lobby-header">不稳定围棋 - 游戏大厅</div>
            <div class="lobby-controls">
                <button class="ctrl-btn" id="createPublicBtn" style="width: auto; padding: 12px 20px;">创建一个公开房间</button>
                <button class="ctrl-btn" id="createPrivateBtn" style="width: auto; padding: 12px 20px;">创建一个私密房间</button>
                <button class="ctrl-btn" id="joinRoomBtn" style="width: auto; padding: 12px 20px;">通过房号加入</button>
            </div>
            <div class="room-list" id="roomList">
                <!-- 动态房单 -->
            </div>
        </div>
    </div>

    <!-- 游戏容器 -->
    <div class="game-wrapper" id="gameContainer" style="display: none;">
        <div class="top-panel">
            <div class="left-group">
                <div class="side-select">
                    <label style="color: #b1d1fc;"><input type="radio" name="color" value="black" id="radioBlack"> ⚫ 黑方</label>
                    <label style="color: #ffeeaa;"><input type="radio" name="color" value="white" id="radioWhite"> ⚪ 白方</label>
                </div>
                <div class="komi-info">黑贴白3.25点</div>
                <div class="komi-info" id="roomIdDisplay" style="background:#5e3e1e; border: 1px solid #7d5e41;">房间: ----</div>
            </div>
            <div class="color-status" id="colorStatus">未选择阵营</div>
        </div>

        <div class="main-area">
            <div class="button-panel">
                <button class="ctrl-btn" id="newGameBtn">🔄 新局</button>
                <button class="ctrl-btn" id="passBtn">🚫 虚着</button>
                <button class="ctrl-btn" id="undoBtn">↩ 悔棋</button>
                <button class="ctrl-btn" id="resignBtn">🏳 认输</button>
                <button class="ctrl-btn" id="leaveRoomBtn" style="background: #9c4b4b; border-bottom-color: #5c2929;">🚪 返回大厅</button>
            </div>

            <div class="board-container">
                <canvas id="goBoard" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="turn-box" id="turnDisplay"></div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
