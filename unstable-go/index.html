<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>不稳定围棋 - 多房间版</title>
    <style>
        /* 样式部分：保留原版样式并增加房间 UI */
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        body { background: #2b5e3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; padding: 10px; }
        
        /* 房间入口样式 */
        #roomUI {
            background: #d9c8ac; padding: 40px; border-radius: 28px; box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid #6b4a2e; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; text-align: center;
        }
        #roomUI input { padding: 12px; border-radius: 8px; border: 2px solid #8f6b4f; background: #f9eed7; font-size: 1rem; }
        .sys-status { color: #5e3e1e; font-size: 0.9rem; margin-bottom: 10px; }

        /* 游戏主体样式 (原封不动) */
        .game-wrapper { background: #d9c8ac; padding: 40px; border-radius: 28px; box-shadow: 0 20px 30px rgba(0,0,0,0.6); border: 2px solid #6b4a2e; width: 100%; max-width: 1200px; margin: 0 auto; }
        .top-panel { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; background: #8f6b4f; padding: 12px 20px; border-radius: 40px; color: #f9eed7; font-weight: bold; margin-bottom: 20px; border-bottom: 4px solid #4d2f1b; gap: 10px; }
        .left-group { display: flex; gap: 30px; align-items: center; flex-wrap: wrap; }
        .side-select { display: flex; gap: 30px; flex-wrap: wrap; }
        .side-select label { font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .side-select input { transform: scale(1.2); margin: 0; }
        .komi-info { background: #3e2e21; padding: 6px 20px; border-radius: 30px; color: #ffd966; font-size: 1rem; white-space: nowrap; }
        .color-status { background: #3e2e21; padding: 6px 16px; border-radius: 30px; color: #ffd966; white-space: nowrap; }
        .main-area { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        .button-panel { display: flex; flex-direction: column; gap: 12px; width: 140px; }
        .ctrl-btn { background: #b88a4b; border: none; color: white; font-weight: bold; padding: 12px 8px; border-radius: 30px; font-size: 1rem; border-bottom: 5px solid #5e3e1e; cursor: pointer; transition: 0.08s; text-align: center; }
        .ctrl-btn:active { border-bottom-width: 2px; transform: translateY(3px); }
        .board-container { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; width: 100%; max-width: 600px; }
        canvas { display: block; background: #deb887; width: 100%; height: auto; aspect-ratio: 1 / 1; border-radius: 4px; box-shadow: inset 0 0 0 1px #6b4a2e, 0 10px 15px #3a2e1e; max-width: 100%; }
        .info-panel { background: #8f6b4f; padding: 20px 16px; border-radius: 20px; color: #efdfbb; width: 100%; max-width: 280px; border: 1px solid #c9a450; margin: 0 auto; min-height: 200px; display: flex; flex-direction: column; margin-bottom: 20px; border-bottom: 4px solid #4d2f1b; }
        .turn-box { background: #3e2e21; padding: 12px; border-radius: 50px; text-align: center; color: #ffd966; font-size: 1.2rem; margin-bottom: 20px; }
        .score-box { background: #3e2e21; padding: 14px; border-radius: 16px; line-height: 1.6; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .score-title { font-size: 1.3rem; margin-bottom: 10px; }
        .score-content { min-height: 60px; }
        @media (max-width: 700px) {
            .game-wrapper { padding: 12px; }
            .button-panel { flex-direction: row; flex-wrap: wrap; width: 100%; margin: 10px 0; }
            .button-panel .ctrl-btn { width: calc(50% - 10px); min-width: 120px; }
            .info-panel { max-width: 100%; }
        }
    </style>
</head>
<body>
    <!-- 房间选择 UI -->
    <div id="roomUI">
        <h2 style="color:#4d2f1b; margin:0;">不稳定围棋</h2>
        <div class="sys-status" id="sysStatus">正在连接服务器...</div>
        <input type="text" id="roomIdInput" placeholder="输入房间号" disabled>
        <input type="password" id="roomPwdInput" placeholder="房间密码 (可选)" disabled>
        <button id="joinRoomBtn" class="ctrl-btn" style="width:100%" disabled>进入房间</button>
    </div>

    <!-- 游戏 UI (初始隐藏) -->
    <div id="gameUI" class="game-wrapper" style="display: none;">
        <div class="top-panel">
            <div class="left-group">
                <div class="side-select">
                    <label style="color: #b1d1fc;"><input type="radio" name="color" value="black" id="radioBlack"> ⚫ 黑方</label>
                    <label style="color: #ffeeaa;"><input type="radio" name="color" value="white" id="radioWhite"> ⚪ 白方</label>
                </div>
                <div class="komi-info">贴3.25点</div>
            </div>
            <div id="roomTag" style="color:#ffd966">房间: -</div>
            <div class="color-status" id="colorStatus">未选择阵营</div>
        </div>

        <div class="main-area">
            <div class="button-panel">
                <button class="ctrl-btn" id="newGameBtn">🔄 新局</button>
                <button class="ctrl-btn" id="estimateBtn">📊 形势</button>
                <button class="ctrl-btn" id="passBtn">🚫 虚着</button>
                <button class="ctrl-btn" id="undoBtn">↩ 悔棋</button>
                <button class="ctrl-btn" id="resignBtn">🏳 认输</button>
                <button class="ctrl-btn" id="endReqBtn">⏹ 终局</button>
                <button class="ctrl-btn" id="leaveBtn" style="background:#8c3c3c">🔙 退出</button>
            </div>

            <div class="board-container">
                <canvas id="goBoard" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="turn-box" id="turnDisplay">等待开始</div>
                <div class="score-box">
                    <div class="score-title" id="scoreTitle">　</div>
                    <div class="score-content">
                        <div id="scoreBoard">　</div>
                        <div id="leadInfo" style="margin-top:12px; color: #ffb870;">　</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心常量 ---
        const PADDING = 25;
        const BOARD_SIZE = 19;
        const KOMI = 3.25;
        const CELL_SIZE = (600 - 2 * PADDING) / (BOARD_SIZE - 1);
        const UNSTABLE_LIFETIME = 40;

        // --- 游戏状态变量 ---
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let unstableInfo = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let moveCount = 0;
        let bornAtMove = []; // 索引为出生手数，值为[row, col]
        let currentPlayer = 1;
        let myColor = null;
        let isMyTurn = false;
        let historyStates = [];
        let lastMoveMarkers = [];
        let showEstimateActive = false;
        let cachedLiveBoard = null;
        let cachedTerritory = null;

        let ws = null;
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isMouseDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

        // UI 引用
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const roomUI = document.getElementById('roomUI');
        const gameUI = document.getElementById('gameUI');
        const sysStatus = document.getElementById('sysStatus');

        // --- 1. 核心博弈逻辑 (完整保留你的原版逻辑) ---

        function copyState() {
            return {
                board: board.map(row => row.slice()),
                unstableInfo: unstableInfo.map(row => row.slice()),
                moveCount: moveCount,
                lastMoveMarkers: lastMoveMarkers.map(m => ({...m}))
            };
        }

        function restoreState(state) {
            board = state.board.map(row => row.slice());
            unstableInfo = state.unstableInfo.map(row => row.slice());
            moveCount = state.moveCount;
            lastMoveMarkers = state.lastMoveMarkers.map(m => ({...m}));
            rebuildBornAtMove();
        }

        function rebuildBornAtMove() {
            bornAtMove = [];
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (unstableInfo[r][c] !== 0) {
                        bornAtMove[unstableInfo[r][c]] = [r, c];
                    }
                }
            }
        }

        function stateToString(b, u) {
            let rows = [];
            for (let r = 0; r < BOARD_SIZE; r++) {
                let row = [];
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (b[r][c] === 0) row.push('0');
                    else row.push((b[r][c] === 1 ? 'B' : 'W') + (u[r][c] === 0 ? 'S' : 'U' + u[r][c]));
                }
                rows.push(row.join(','));
            }
            return rows.join(';');
        }

        function isRepeatBoard(newB, newU) {
            let s = stateToString(newB, newU);
            return historyStates.some(state => stateToString(state.board, state.unstableInfo) === s);
        }

        function hasLiberty(b, row, col) {
            let color = b[row][col];
            if (color === 0) return false;
            let visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false));
            let queue = [[row, col]];
            visited[row][col] = true;
            const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            while (queue.length) {
                let [r, c] = queue.shift();
                for (let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
                    if (b[nr][nc] === 0) return true;
                    if (b[nr][nc] === color && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            return false;
        }

        function removeGroup(b, u, row, col, color) {
            let queue = [[row, col]];
            b[row][col] = 0; u[row][col] = 0;
            const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            while (queue.length) {
                let [r, c] = queue.shift();
                for (let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === color) {
                        b[nr][nc] = 0; u[nr][nc] = 0;
                        queue.push([nr, nc]);
                    }
                }
            }
        }

        function tryPlaceStone(row, col) {
            const playerVal = myColor === 'black' ? 1 : 2;
            if (board[row][col] !== 0) {
                if (unstableInfo[row][col] === 0 || board[row][col] !== playerVal) return false;
            }

            let currentState = copyState();
            let newMoveCount = moveCount + 1;
            let wasUnstable = (unstableInfo[row][col] !== 0);

            if (wasUnstable) {
                let born = unstableInfo[row][col];
                if (bornAtMove[born] && bornAtMove[born][0] === row && bornAtMove[born][1] === col) bornAtMove[born] = null;
                board[row][col] = 0; unstableInfo[row][col] = 0;
            }

            board[row][col] = playerVal;
            if (!wasUnstable) {
                unstableInfo[row][col] = newMoveCount;
                bornAtMove[newMoveCount] = [row, col];
            } else {
                unstableInfo[row][col] = 0;
            }

            // 提子判断
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === 3 - playerVal && !hasLiberty(board, i, j)) removeGroup(board, unstableInfo, i, j, 3 - playerVal);
                }
            }
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === playerVal && !hasLiberty(board, i, j)) removeGroup(board, unstableInfo, i, j, playerVal);
                }
            }

            // 寿命判断
            let toDie = newMoveCount - UNSTABLE_LIFETIME;
            if (toDie >= 0 && bornAtMove[toDie]) {
                let [r, c] = bornAtMove[toDie];
                if (board[r][c] !== 0 && unstableInfo[r][c] === toDie) {
                    board[r][c] = 0; unstableInfo[r][c] = 0;
                    bornAtMove[toDie] = null;
                }
            }

            if (isRepeatBoard(board, unstableInfo)) {
                restoreState(currentState);
                return false;
            }
            moveCount = newMoveCount;
            currentPlayer = 3 - playerVal;
            lastMoveMarkers = [{row, col, color: playerVal}];
            return true;
        }

        // --- 2. 渲染逻辑 (完整版 Canvas 绘图) ---

        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#3a281c';
            for (let i = 0; i < BOARD_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(PADDING + i * CELL_SIZE, PADDING); ctx.lineTo(PADDING + i * CELL_SIZE, 600 - PADDING); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(PADDING, PADDING + i * CELL_SIZE); ctx.lineTo(600 - PADDING, PADDING + i * CELL_SIZE); ctx.stroke();
            }
            const stars = [3, 9, 15]; ctx.fillStyle = '#3a281c';
            stars.forEach(r => stars.forEach(c => {
                ctx.beginPath(); ctx.arc(PADDING + c * CELL_SIZE, PADDING + r * CELL_SIZE, CELL_SIZE * 0.12, 0, 2 * Math.PI); ctx.fill();
            }));

            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) continue;
                    const x = PADDING + c * CELL_SIZE, y = PADDING + r * CELL_SIZE, radius = CELL_SIZE * 0.44;
                    // 渐变棋子
                    const grad = ctx.createRadialGradient(x - 3, y - 3, radius * 0.2, x, y, radius * 1.2);
                    if (board[r][c] === 1) { grad.addColorStop(0, '#444'); grad.addColorStop(1, '#111'); }
                    else { grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#aaa'); }
                    ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI); ctx.fillStyle = grad; ctx.fill();
                    // 倒计时提示
                    if (unstableInfo[r][c] !== 0) {
                        let rem = unstableInfo[r][c] + UNSTABLE_LIFETIME - moveCount;
                        ctx.font = 'bold 10px Arial'; ctx.fillStyle = rem < 5 ? '#ff0000' : (board[r][c] === 1 ? '#ff9900' : '#0099ff');
                        ctx.textAlign = 'center'; ctx.fillText(rem, x, y + 4);
                        ctx.strokeStyle = ctx.fillStyle; ctx.beginPath(); ctx.arc(x, y, radius + 1, 0, 2 * Math.PI); ctx.stroke();
                    }
                }
            }
            // 标记
            lastMoveMarkers.forEach(m => {
                ctx.fillStyle = m.color === 1 ? '#fff' : '#000';
                ctx.fillRect(PADDING + m.col * CELL_SIZE - 2, PADDING + m.row * CELL_SIZE - 2, 4, 4);
            });
        }

        // --- 3. 形势判断逻辑 (完整版) ---
        function isLibertyControlled(b, r, c, opp) {
            for (let [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                let nr = r+dr, nc = c+dc;
                if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === opp) return true;
            }
            return false;
        }

        function removeDeadStones(src) {
            let b = src.map(r => r.slice());
            let changed = true;
            while(changed) {
                changed = false;
                let visited = Array(19).fill().map(() => Array(19).fill(false));
                for(let r=0; r<19; r++) {
                    for(let c=0; c<19; c++) {
                        if(b[r][c] !== 0 && !visited[r][c]) {
                            let color = b[r][c], queue = [[r,c]], stones = [[r,c]], libs = new Set();
                            visited[r][c] = true;
                            let head = 0;
                            while(head < queue.length) {
                                let [currR, currC] = queue[head++];
                                for(let [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                                    let nr = currR+dr, nc = currC+dc;
                                    if(nr<0||nr>=19||nc<0||nc>=19) continue;
                                    if(b[nr][nc] === 0) libs.add(nr+','+nc);
                                    else if(b[nr][nc] === color && !visited[nr][nc]) { visited[nr][nc]=true; queue.push([nr,nc]); stones.push([nr,nc]); }
                                }
                            }
                            if(libs.size === 0 || (libs.size <= 2 && Array.from(libs).every(l => {
                                let [lr, lc] = l.split(',').map(Number);
                                return isLibertyControlled(b, lr, lc, 3-color);
                            }))) {
                                stones.forEach(([sr,sc]) => b[sr][sc] = 0);
                                changed = true;
                            }
                        }
                    }
                }
            }
            return b;
        }

        function getTerritory(liveB) {
            let terr = Array(19).fill().map(() => Array(19).fill(0));
            let bStones = [], wStones = [];
            for(let r=0; r<19; r++) for(let c=0; c<19; c++) {
                if(liveB[r][c] === 1) bStones.push([r,c]);
                else if(liveB[r][c] === 2) wStones.push([r,c]);
            }
            for(let r=0; r<19; r++) for(let c=0; c<19; c++) {
                if(liveB[r][c] !== 0) continue;
                let db = Infinity, dw = Infinity;
                bStones.forEach(([sr,sc]) => db = Math.min(db, Math.abs(r-sr)+Math.abs(c-sc)));
                wStones.forEach(([sr,sc]) => dw = Math.min(dw, Math.abs(r-sr)+Math.abs(c-sc)));
                if(db < dw) terr[r][c] = 1; else if(dw < db) terr[r][c] = 2;
            }
            return terr;
        }

        function updateScoreDisplay() {
            let live = removeDeadStones(board);
            let terr = getTerritory(live);
            let b = 0, w = 0;
            for(let r=0; r<19; r++) for(let c=0; c<19; c++) {
                if(live[r][c] === 1 || terr[r][c] === 1) b++;
                else if(live[r][c] === 2 || terr[r][c] === 2) w++;
            }
            let diff = b - w - KOMI;
            document.getElementById('scoreBoard').innerText = `黑: ${b} | 白: ${w}`;
            document.getElementById('leadInfo').innerText = diff > 0 ? `黑领先 ${diff.toFixed(2)}` : `白领先 ${(-diff).toFixed(2)}`;
            return {b, w};
        }

        // --- 4. 网络与房间逻辑 ---

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/unstable-weiqi`);
            
            ws.onopen = () => {
                sysStatus.innerText = "已连接，请输入房间号";
                document.getElementById('roomIdInput').disabled = false;
                document.getElementById('roomPwdInput').disabled = false;
                document.getElementById('joinRoomBtn').disabled = false;
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                switch(msg.type) {
                    case 'roomJoined':
                        roomUI.style.display = 'none';
                        gameUI.style.display = 'block';
                        document.getElementById('roomTag').innerText = "房间: " + msg.roomId;
                        syncGameState(msg.gameState);
                        updateUI(msg.blackTaken, msg.whiteTaken);
                        break;
                    case 'roomError':
                        alert(msg.message);
                        break;
                    case 'init':
                        updateUI(msg.blackTaken, msg.whiteTaken);
                        break;
                    case 'colorAssigned':
                        myColor = msg.color;
                        document.getElementById('colorStatus').innerText = "你是: " + (myColor === 'black' ? '黑方' : '白方');
                        updateTurn();
                        break;
                    case 'broadcast':
                        if(msg.action === 'move' || msg.action === 'pass' || msg.action === 'undoAccept') {
                            syncGameState(msg);
                        } else if(msg.action === 'endAgreed') {
                            let res = updateScoreDisplay();
                            alert(`对局结束！\n黑: ${res.b} 白: ${res.w}\n结果: ${res.b-res.w > KOMI ? '黑胜' : '白胜'}`);
                        }
                        break;
                    case 'undoRequest':
                        if(confirm("对方请求悔棋，是否同意？")) ws.send(JSON.stringify({type:'undoResponse', accept:true}));
                        break;
                    case 'newGame':
                        syncGameState(msg);
                        myColor = null;
                        document.getElementById('radioBlack').checked = false;
                        document.getElementById('radioWhite').checked = false;
                        document.getElementById('colorStatus').innerText = "未选择阵营";
                        break;
                }
            };
        }

        function syncGameState(data) {
            board = data.board;
            unstableInfo = data.unstableInfo;
            moveCount = data.moveCount;
            currentPlayer = data.currentPlayer;
            historyStates = data.historyStates || [];
            lastMoveMarkers = data.lastMoveMarkers || [];
            rebuildBornAtMove();
            updateTurn();
        }

        function updateUI(b, w) {
            document.getElementById('radioBlack').disabled = b && myColor !== 'black';
            document.getElementById('radioWhite').disabled = w && myColor !== 'white';
        }

        function updateTurn() {
            isMyTurn = (myColor === 'black' && currentPlayer === 1) || (myColor === 'white' && currentPlayer === 2);
            document.getElementById('turnDisplay').innerText = currentPlayer === 1 ? "⚫ 黑方回合" : "⚪ 白方回合";
            document.getElementById('turnDisplay').style.color = isMyTurn ? "#ffd966" : "#efdfbb";
            drawBoard();
        }

        // --- 5. 事件绑定 ---

        document.getElementById('joinRoomBtn').onclick = () => {
            const roomId = document.getElementById('roomIdInput').value;
            const password = document.getElementById('roomPwdInput').value;
            if(!roomId) return alert("请输入房间号");
            ws.send(JSON.stringify({ type: 'joinRoom', roomId, password }));
        };

        canvas.onclick = (e) => {
            if(!isMyTurn) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (600 / rect.width);
            const y = (e.clientY - rect.top) * (600 / rect.height);
            const c = Math.round((x - PADDING) / CELL_SIZE);
            const r = Math.round((y - PADDING) / CELL_SIZE);
            if(r>=0 && r<19 && c>=0 && c<19) {
                if(tryPlaceStone(r, c)) {
                    ws.send(JSON.stringify({
                        type: 'move', board, unstableInfo, moveCount, nextPlayer: currentPlayer, lastMoveMarkers
                    }));
                    updateTurn();
                }
            }
        };

        document.getElementById('passBtn').onclick = () => {
            if(!isMyTurn) return;
            let currentState = copyState();
            historyStates.push(currentState);
            moveCount++;
            currentPlayer = 3 - (myColor === 'black' ? 1 : 2);
            ws.send(JSON.stringify({ type: 'pass', board, unstableInfo, moveCount, nextPlayer: currentPlayer, lastMoveMarkers: [] }));
            updateTurn();
        };

        document.getElementById('radioBlack').onchange = () => ws.send(JSON.stringify({type:'selectColor', color:'black'}));
        document.getElementById('radioWhite').onchange = () => ws.send(JSON.stringify({type:'selectColor', color:'white'}));
        document.getElementById('undoBtn').onclick = () => ws.send(JSON.stringify({type:'undoRequest'}));
        document.getElementById('newGameBtn').onclick = () => confirm("确定重置本局？") && ws.send(JSON.stringify({type:'newGame'}));
        document.getElementById('estimateBtn').onclick = () => updateScoreDisplay();
        document.getElementById('leaveBtn').onclick = () => window.location.reload();
        document.getElementById('endReqBtn').onclick = () => ws.send(JSON.stringify({type:'endRequest'}));

        connectWebSocket();
    </script>
</body>
</html>
