<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>不稳定围棋</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: #2b5e3b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
        }

        .game-wrapper {
            background: #d9c8ac;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid #6b4a2e;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #8f6b4f;
            padding: 12px 20px;
            border-radius: 40px;
            color: #f9eed7;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 4px solid #4d2f1b;
            gap: 10px;
        }

        .left-group {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .side-select {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

            .side-select label {
                font-size: 1.1rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .side-select input {
                transform: scale(1.2);
                margin: 0;
            }

        .komi-info {
            background: #3e2e21;
            padding: 6px 20px;
            border-radius: 30px;
            color: #ffd966;
            font-size: 1rem;
            white-space: nowrap;
        }

        .color-status {
            background: #3e2e21;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffd966;
            white-space: nowrap;
        }

        .main-area {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 140px;
        }

        .ctrl-btn {
            background: #b88a4b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 8px;
            border-radius: 30px;
            font-size: 1rem;
            border-bottom: 5px solid #5e3e1e;
            cursor: pointer;
            transition: 0.08s;
            text-align: center;
        }

        .ctrl-btn:active {
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 0 0 auto;
            width: 100%;
            max-width: 600px;
        }

        canvas {
            display: block;
            background: #deb887;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            box-shadow: inset 0 0 0 1px #6b4a2e, 0 10px 15px #3a2e1e;
            max-width: 100%;
        }

        .info-panel {
            background: #8f6b4f;
            padding: 20px 16px;
            border-radius: 20px;
            color: #efdfbb;
            width: 100%;
            max-width: 280px;
            border: 1px solid #c9a450;
            margin: 0 auto;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            border-bottom: 4px solid #4d2f1b;
        }

        .turn-box {
            background: #3e2e21;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            color: #ffd966;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .score-box {
            background: #3e2e21;
            padding: 14px;
            border-radius: 16px;
            line-height: 1.6;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .score-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .score-content {
            min-height: 60px;
        }

        @media (max-width: 700px) {
            .game-wrapper {
                padding: 12px;
            }

            .button-panel {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
                margin: 10px 0 0 0;
                gap: 10px;
            }

            .button-panel .ctrl-btn {
                width: calc(50% - 10px);
                min-width: 120px;
            }

            .info-panel {
                max-width: 100%;
                margin-top: 10px;
            }

            .top-panel {
                padding: 10px 12px;
            }

            .left-group {
                gap: 15px;
            }

            .side-select label {
                font-size: 0.95rem;
            }

            .komi-info {
                white-space: normal;
                font-size: 0.9rem;
            }

            .color-status {
                white-space: normal;
                font-size: 0.9rem;
            }

            .board-container {
                max-width: 100%;
            }
        }

        .touch-device .mobile-actions {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="top-panel">
            <div class="left-group">
                <div class="side-select">
                    <label style="color: #b1d1fc;"><input type="radio" name="color" value="black" id="radioBlack"> ⚫ 黑方</label>
                    <label style="color: #ffeeaa;"><input type="radio" name="color" value="white" id="radioWhite"> ⚪ 白方</label>
                </div>
                <div class="komi-info">黑贴白3.25点</div>
            </div>
            <div class="color-status" id="colorStatus">未选择阵营</div>
        </div>

        <div class="main-area">
            <div class="button-panel">
                <button class="ctrl-btn" id="newGameBtn">🔄 新局</button>
                <button class="ctrl-btn" id="estimateBtn">📊 形势判断</button>
                <button class="ctrl-btn" id="passBtn">🚫 broad着</button>
                <button class="ctrl-btn" id="undoBtn">↩ 悔棋</button>
                <button class="ctrl-btn" id="resignBtn">🏳 认输</button>
                <button class="ctrl-btn" id="endReqBtn">⏹ 申请终局</button>
            </div>

            <div class="board-container">
                <canvas id="goBoard" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="turn-box" id="turnDisplay"></div>
                <div class="score-box">
                    <div class="score-title" id="scoreTitle">　</div>
                    <div class="score-content">
                        <div id="scoreBoard">　</div>
                        <div id="leadInfo" style="margin-top:12px; color: #ffb870;">　</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PADDING = 25;
        const BOARD_SIZE = 19;
        const KOMI = 3.25;
        const CELL_SIZE = (600 - 2 * PADDING) / (BOARD_SIZE - 1);
        const UNSTABLE_LIFETIME = 40;

        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isMouseDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        document.body.classList.add(isTouchDevice ? 'touch-device' : 'no-touch');

        // 核心数据结构
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));          // 0空,1黑,2白
        let unstableInfo = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));  // 0表示稳定或空，否则为出生手数
        let moveCount = 0;                     // 当前已走手数（从0开始，下一手为moveCount+1）
        let bornAtMove = [];                    // 索引为出生手数，值为[row, col]或null，用于快速定位到寿棋子

        let currentPlayer = 1;                  // 1:黑, 2:白
        let myColor = null;                      // 'black' 或 'white'
        let isMyTurn = false;

        let hoverRow = -1, hoverCol = -1;
        let isHoverValid = false;

        // 历史局面存储：数组，每个元素是包含 board, unstableInfo, moveCount, lastMoveMarkers 的对象
        let historyStates = [];
        let lastMoveMarkers = [];

        let showEstimateActive = false;

        // 缓存形势判断结果
        let cachedLiveBoard = null;
        let cachedTerritory = null;

        let ws;

        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turnDisplay');
        const colorStatus = document.getElementById('colorStatus');
        const radioBlack = document.getElementById('radioBlack');
        const radioWhite = document.getElementById('radioWhite');
        const scoreTitle = document.getElementById('scoreTitle');
        const scoreBoard = document.getElementById('scoreBoard');
        const leadInfo = document.getElementById('leadInfo');

        function formatScore(num) {
            let str = num.toFixed(2);
            str = str.replace(/\.?0+$/, '');
            return str;
        }

        // 深拷贝当前完整状态
        function copyState() {
            return {
                board: board.map(row => row.slice()),
                unstableInfo: unstableInfo.map(row => row.slice()),
                moveCount: moveCount,
                lastMoveMarkers: lastMoveMarkers.map(m => ({...m}))
            };
        }

        // 从保存的状态恢复
        function restoreState(state) {
            board = state.board.map(row => row.slice());
            unstableInfo = state.unstableInfo.map(row => row.slice());
            moveCount = state.moveCount;
            lastMoveMarkers = state.lastMoveMarkers.map(m => ({...m}));
            // 注意：bornAtMove 不需要恢复，因为后续落子时会重新设置
        }

        // 生成局面唯一字符串（用于禁全同判断），包含稳定信息
        function stateToString(board, unstableInfo) {
            let rows = [];
            for (let r = 0; r < BOARD_SIZE; r++) {
                let row = [];
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) {
                        row.push('0');
                    } else {
                        let colorChar = board[r][c] === 1 ? 'B' : 'W';
                        if (unstableInfo[r][c] === 0) {
                            row.push(colorChar + 'S'); // 稳定
                        } else {
                            row.push(colorChar + 'U' + unstableInfo[r][c]); // 不稳定带出生手数
                        }
                    }
                }
                rows.push(row.join(','));
            }
            return rows.join(';');
        }

        // 禁全同检查
        function isRepeatBoard(newBoard, newUnstableInfo) {
            let newStr = stateToString(newBoard, newUnstableInfo);
            return historyStates.some(state => stateToString(state.board, state.unstableInfo) === newStr);
        }

        // 移除一组棋子（用于提子），同时清除不稳定信息
        function removeGroup(board, unstableInfo, row, col, color) {
            let queue = [[row, col]];
            board[row][col] = 0;
            unstableInfo[row][col] = 0;
            while (queue.length) {
                let [r, c] = queue.shift();
                const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                for (let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === color) {
                        board[nr][nc] = 0;
                        unstableInfo[nr][nc] = 0;
                        queue.push([nr, nc]);
                    }
                }
            }
        }

        // 判断一块棋是否有气（使用当前棋盘）
        function hasLiberty(board, row, col) {
            let color = board[row][col];
            if (color === 0) return false;
            let visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false));
            let queue = [[row, col]];
            visited[row][col] = true;
            const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            while (queue.length) {
                let [r, c] = queue.shift();
                for (let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
                    if (board[nr][nc] === 0) return true;
                    if (board[nr][nc] === color && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            return false;
        }

        // 核心落子逻辑
        function tryPlaceStone(row, col) {
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;

            const playerVal = myColor === 'black' ? 1 : 2;

            // 检查可落子：空位 或 己方不稳定棋子
            if (board[row][col] !== 0) {
                if (unstableInfo[row][col] === 0) return false;
                if (board[row][col] !== playerVal) return false; 
            }

            // 保存当前状态用于历史
            let currentState = copyState();
            historyStates.push(currentState);

            // 计算新手数（落子后）
            let newMoveCount = moveCount + 1;

            let wasUnstable = (unstableInfo[row][col] !== 0);
            if (wasUnstable) {
                // 从 bornAtMove 中清除
                let born = unstableInfo[row][col];
                if (bornAtMove[born] && bornAtMove[born][0] === row && bornAtMove[born][1] === col) {
                    bornAtMove[born] = null;
                }
                board[row][col] = 0;
                unstableInfo[row][col] = 0;
            }

            // 落子
            board[row][col] = playerVal;
            if (!wasUnstable) {
                // 空位落子：产生不稳定棋子，记录出生手数
                unstableInfo[row][col] = newMoveCount; // 出生手数 = 新手数
                // 记录到 bornAtMove
                bornAtMove[newMoveCount] = [row, col];
            } else {
                // 覆盖己方不稳定棋子：变成稳定，不记录出生手数
                unstableInfo[row][col] = 0;
            }

            // 提子流程：先提对方，再提己方（自提）
            // 检查对方棋子是否有气
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === 3 - playerVal && !hasLiberty(board, i, j)) {
                        removeGroup(board, unstableInfo, i, j, 3 - playerVal);
                    }
                }
            }
            // 检查己方棋子是否有气（自提）
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === playerVal && !hasLiberty(board, i, j)) {
                        removeGroup(board, unstableInfo, i, j, playerVal);
                    }
                }
            }

            // 检查是否有到寿棋子（出生手数 = newMoveCount - UNSTABLE_LIFETIME）
            let toDieBorn = newMoveCount - UNSTABLE_LIFETIME;
            if (toDieBorn >= 0 && bornAtMove[toDieBorn]) {
                let [r, c] = bornAtMove[toDieBorn];
                // 确认该位置仍然是不稳定棋子，且出生手数匹配
                if (r !== undefined && c !== undefined && board[r][c] !== 0 && unstableInfo[r][c] === toDieBorn) {
                    // 移除该棋子
                    board[r][c] = 0;
                    unstableInfo[r][c] = 0;
                    bornAtMove[toDieBorn] = null;
                }
            }

            // 更新 moveCount
            moveCount = newMoveCount;
            // 切换玩家
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            lastMoveMarkers = [{ row, col, color: playerVal }];

            // 禁全同检查
            if (isRepeatBoard(board, unstableInfo)) {
                // 回退
                restoreState(currentState);
                historyStates.pop(); // 移除刚刚加入的历史
                return false;
            }

            return true;
        }

        // 虚着处理
        function pass() {
            let currentState = copyState();
            historyStates.push(currentState);

            // 虚着增加手数
            moveCount++;
            // 切换玩家
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            lastMoveMarkers = [];

            // 检查到寿棋子
            let toDieBorn = moveCount - UNSTABLE_LIFETIME;
            if (toDieBorn >= 0 && bornAtMove[toDieBorn]) {
                let [r, c] = bornAtMove[toDieBorn];
                if (r !== undefined && c !== undefined && board[r][c] !== 0 && unstableInfo[r][c] === toDieBorn) {
                    board[r][c] = 0;
                    unstableInfo[r][c] = 0;
                    bornAtMove[toDieBorn] = null;
                }
            }

            return true;
        }

        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600);
            const cellSize = CELL_SIZE;

            // 画网格
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#3a281c';
            for (let i = 0; i < BOARD_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(PADDING + i * cellSize, PADDING);
                ctx.lineTo(PADDING + i * cellSize, 600 - PADDING);
                ctx.stroke();
                ctx.moveTo(PADDING, PADDING + i * cellSize);
                ctx.lineTo(600 - PADDING, PADDING + i * cellSize);
                ctx.stroke();
            }

            // 星位
            const stars = [3, 9, 15];
            ctx.fillStyle = '#3a281c';
            stars.forEach(r => stars.forEach(c => {
                ctx.beginPath();
                ctx.arc(PADDING + c * cellSize, PADDING + r * cellSize, cellSize * 0.12, 0, 2 * Math.PI);
                ctx.fill();
            }));

            // 棋子
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) continue;
                    const x = PADDING + c * cellSize;
                    const y = PADDING + r * cellSize;
                    const radius = cellSize * 0.44;

                    // 阴影
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowOffsetY = 2;

                    // 主球体
                    const gradient = ctx.createRadialGradient(x - 3, y - 3, radius * 0.2, x, y, radius * 1.2);
                    if (board[r][c] === 1) {
                        gradient.addColorStop(0, '#444');
                        gradient.addColorStop(0.6, '#222');
                        gradient.addColorStop(1, '#111');
                    } else { // 白子
                        gradient.addColorStop(0, '#fff');
                        gradient.addColorStop(0.5, '#eee');
                        gradient.addColorStop(1, '#aaa');
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                    ctx.beginPath();
                    ctx.arc(x - 3, y - 3, radius * 0.15, 0, 2 * Math.PI);
                    if (board[r][c] === 1)
                        ctx.fillStyle = '#444';
                    else
                        ctx.fillStyle = '#fff';
                    ctx.fill();

                    if (unstableInfo[r][c] !== 0) {
                        let remaining = unstableInfo[r][c] + UNSTABLE_LIFETIME - moveCount;

                        if (remaining < 5)
                            ctx.strokeStyle = '#ff0000';
                        else if (board[r][c] === 1)
                            ctx.strokeStyle = '#ff9900';
                        else
                            ctx.strokeStyle = '#0099ff';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(x, y, radius + 1, 0, 2 * Math.PI);
                        ctx.stroke();

                        ctx.font = 'bold 10px Arial';
                        ctx.textBaseline = 'top';
                        if (remaining < 5)
                            ctx.fillStyle = '#ff0000';
                        else if (board[r][c] === 1)
                            ctx.fillStyle = '#ff9900';
                        else
                            ctx.fillStyle = '#0099ff';
                        ctx.shadowBlur = 0;
                        ctx.fillText(remaining, x - radius + 10, y - radius + 4);
                    }
                }
            }

            // 前一步落子标记
            const markLen = cellSize * 0.352;
            lastMoveMarkers.forEach(({ row, col, color }) => {
                const x = PADDING + col * cellSize;
                const y = PADDING + row * cellSize;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + markLen, y);
                ctx.lineTo(x, y + markLen);
                ctx.closePath();
                if (color === 1) ctx.fillStyle = '#ffffff';
                else if (color === 2) ctx.fillStyle = '#222222';
                else ctx.fillStyle = '#ff4444';
                ctx.fill();
            });

            // 坐标：上方字母
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = '#3a281c';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let c = 0; c < BOARD_SIZE; c++) {
                let letter = String.fromCharCode(65 + c);
                let x = PADDING + c * cellSize;
                let y = 0.6 * PADDING;
                ctx.fillText(letter, x, y);
            }
            // 左侧数字
            for (let r = 0; r < BOARD_SIZE; r++) {
                let number = (r + 1).toString();
                let x = PADDING / 2;
                let y = PADDING + r * cellSize;
                ctx.fillText(number, x, y);
            }

            // 悬停预览
            if (isMyTurn && isHoverValid && hoverRow >= 0 && hoverCol >= 0) {
                let hoverVal = myColor === 'black' ? 1 : 2;
                if (board[hoverRow][hoverCol] === 0 ||
                    (unstableInfo[hoverRow][hoverCol] !== 0 && board[hoverRow][hoverCol] === hoverVal)) {
                    ctx.globalAlpha = 0.45;
                    ctx.beginPath();
                    ctx.arc(PADDING + hoverCol * cellSize, PADDING + hoverRow * cellSize, cellSize * 0.44, 0, 2 * Math.PI);
                    ctx.fillStyle = myColor === 'black' ? '#222' : '#ddd';
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
        }

        function isLibertySurroundedByOpponent(board, libertyRow, libertyCol, opponentColor) {
            const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            for (let [dr, dc] of dirs) {
                let nr = libertyRow + dr, nc = libertyCol + dc;
                if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
                if (board[nr][nc] === opponentColor) return true;
            }
            return false;
        }

        function removeDeadAndDying(srcBoard) {
            let boardCopy = srcBoard.map(row => row.slice());
            let changed = true;
            while (changed) {
                changed = false;
                let visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false));

                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (boardCopy[r][c] !== 0 && !visited[r][c]) {
                            let color = boardCopy[r][c];
                            let queue = [[r, c]];
                            visited[r][c] = true;
                            let stones = [[r, c]];
                            let liberties = new Set();
                            let idx = 0;
                            while (idx < queue.length) {
                                let [rr, cc] = queue[idx++];
                                const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                                for (let [dr, dc] of dirs) {
                                    let nr = rr + dr, nc = cc + dc;
                                    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
                                    if (boardCopy[nr][nc] === 0) {
                                        liberties.add(nr + ',' + nc);
                                    } else if (boardCopy[nr][nc] === color && !visited[nr][nc]) {
                                        visited[nr][nc] = true;
                                        queue.push([nr, nc]);
                                        stones.push([nr, nc]);
                                    }
                                }
                            }

                            if (liberties.size === 0) {
                                for (let [rr, cc] of stones) {
                                    boardCopy[rr][cc] = 0;
                                }
                                changed = true;
                                continue;
                            }

                            if (liberties.size <= 2) {
                                let allLibertiesControlled = true;
                                for (let lib of liberties) {
                                    let [lr, lc] = lib.split(',').map(Number);
                                    if (!isLibertySurroundedByOpponent(boardCopy, lr, lc, 3 - color)) {
                                        allLibertiesControlled = false;
                                        break;
                                    }
                                }
                                if (allLibertiesControlled) {
                                    for (let [rr, cc] of stones) {
                                        boardCopy[rr][cc] = 0;
                                    }
                                    changed = true;
                                }
                            }
                        }
                    }
                }
            }
            return boardCopy;
        }

        function assignTerritoryWithRange(liveBoard) {
            let blackStones = [];
            let whiteStones = [];
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (liveBoard[r][c] === 1) blackStones.push([r, c]);
                    else if (liveBoard[r][c] === 2) whiteStones.push([r, c]);
                }
            }

            let territory = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));

            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (liveBoard[r][c] !== 0) continue;

                    let minDistBlack = Infinity;
                    let minDistWhite = Infinity;
                    for (let [br, bc] of blackStones) {
                        let dist = Math.abs(r - br) + Math.abs(c - bc);
                        if (dist < minDistBlack) minDistBlack = dist;
                    }
                    for (let [wr, wc] of whiteStones) {
                        let dist = Math.abs(r - wr) + Math.abs(c - wc);
                        if (dist < minDistWhite) minDistWhite = dist;
                    }

                    let range = (r <= 1 || r >= BOARD_SIZE - 2 || c <= 1 || c >= BOARD_SIZE - 2) ? 5 : 4;
                    let blackInRange = minDistBlack <= range;
                    let whiteInRange = minDistWhite <= range;

                    if (!blackInRange && !whiteInRange) {
                        territory[r][c] = 3;
                    } else if (blackInRange && !whiteInRange) {
                        territory[r][c] = 1;
                    } else if (!blackInRange && whiteInRange) {
                        territory[r][c] = 2;
                    } else {
                        if (minDistBlack < minDistWhite) territory[r][c] = 1;
                        else if (minDistWhite < minDistBlack) territory[r][c] = 2;
                        else territory[r][c] = 3;
                    }
                }
            }
            return territory;
        }

        function computeScore(liveBoard, territory) {
            let blackStones = 0, whiteStones = 0;
            let blackTerritory = 0, whiteTerritory = 0, publicTerritory = 0;
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (liveBoard[r][c] === 1) blackStones++;
                    else if (liveBoard[r][c] === 2) whiteStones++;
                    else {
                        if (territory[r][c] === 1) blackTerritory++;
                        else if (territory[r][c] === 2) whiteTerritory++;
                        else if (territory[r][c] === 3) publicTerritory++;
                    }
                }
            }
            let blackTotal = blackStones + blackTerritory + publicTerritory / 2;
            let whiteTotal = whiteStones + whiteTerritory + publicTerritory / 2;
            return { blackTotal, whiteTotal };
        }

        function computeScoreFromBoard(srcBoard) {
            let liveBoard = removeDeadAndDying(srcBoard);
            let territory = assignTerritoryWithRange(liveBoard);
            return computeScore(liveBoard, territory);
        }

        function drawEstimateOverlay(liveBoard, territory) {
            const cellSize = CELL_SIZE;
            const dotRadius = cellSize * 0.18;

            // 死子标记
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] !== 0 && liveBoard[r][c] === 0) {
                        let x = PADDING + c * cellSize;
                        let y = PADDING + r * cellSize;
                        ctx.fillStyle = board[r][c] === 1 ? '#ffffff' : '#222222';
                        ctx.fillRect(x - dotRadius, y - dotRadius, dotRadius * 2, dotRadius * 2);
                    }
                }
            }

            // 领地归属点
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] !== 0) continue;
                    let owner = territory[r][c];
                    if (owner === 0 || owner === 3) continue;
                    ctx.fillStyle = owner === 1 ? '#222' : '#f0f0f0';
                    let x = PADDING + c * cellSize;
                    let y = PADDING + r * cellSize;
                    ctx.fillRect(x - dotRadius, y - dotRadius, dotRadius * 2, dotRadius * 2);
                }
            }
        }

        function drawBoardWithOverlay() {
            drawBoard();
            if (showEstimateActive && cachedLiveBoard && cachedTerritory) {
                drawEstimateOverlay(cachedLiveBoard, cachedTerritory);
            }
        }

        function showEstimate() {
            if (!showEstimateActive) {
                clearEstimate();
                return;
            }
            cachedLiveBoard = removeDeadAndDying(board);
            cachedTerritory = assignTerritoryWithRange(cachedLiveBoard);
            let { blackTotal, whiteTotal } = computeScore(cachedLiveBoard, cachedTerritory);
            let lead = blackTotal - whiteTotal - 2 * KOMI;
            let leadStr = (lead >= 0 ? '+' : '') + formatScore(lead);
            scoreTitle.innerText = '🏆 形势';
            scoreBoard.innerText = `黑: ${formatScore(blackTotal)} | 白: ${formatScore(whiteTotal)}`;
            leadInfo.innerText = `黑${leadStr}点`;
            drawBoardWithOverlay();
        }

        function clearEstimate() {
            cachedLiveBoard = null;
            cachedTerritory = null;
            scoreTitle.innerText = '　';
            scoreBoard.innerText = '　';
            leadInfo.innerText = '　';
            drawBoard();
        }

        // 更新回合显示
        function updateTurn() {
            let totalHand = moveCount + 1; // 当前手数（下一步的序号）
            let turnText = currentPlayer === 1 ? '⚫ 第' + totalHand + '手' : '⚪ 第' + totalHand + '手';
            turnDisplay.innerText = turnText;
            isMyTurn = (myColor === 'black' && currentPlayer === 1) || (myColor === 'white' && currentPlayer === 2);
            drawBoardWithOverlay();
        }

        // ---------- WebSocket 通信 ----------
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/unstable-weiqi`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => console.log('已连接对弈服务器');
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };
            ws.onclose = () => {
                colorStatus.innerText = '连接断开，重连中...';
                setTimeout(connectWebSocket, 2000);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'init':
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    break;
                case 'colorAssigned':
                    myColor = msg.color;
                    colorStatus.innerText = `已选择: ${myColor === 'black' ? '黑方' : '白方'}`;
                    if (myColor === 'black') radioBlack.checked = true;
                    else radioWhite.checked = true;
                    updateTurn();
                    break;
                case 'colorTaken':
                    alert('该颜色已被占用');
                    break;
                case 'gameState':
                    // 接收服务器完整状态
                    board = msg.board;
                    unstableInfo = msg.unstableInfo;
                    moveCount = msg.moveCount;
                    currentPlayer = msg.currentPlayer;
                    historyStates = msg.historyStates || [];
                    lastMoveMarkers = msg.lastMoveMarkers || [];
                    // 重建 bornAtMove（简单方法：遍历 unstableInfo）
                    bornAtMove = [];
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        for (let c = 0; c < BOARD_SIZE; c++) {
                            if (unstableInfo[r][c] !== 0) {
                                bornAtMove[unstableInfo[r][c]] = [r, c];
                            }
                        }
                    }
                    if (showEstimateActive) {
                        cachedLiveBoard = removeDeadAndDying(board);
                        cachedTerritory = assignTerritoryWithRange(cachedLiveBoard);
                    }
                    drawBoardWithOverlay();
                    updateTurn();
                    break;
                case 'broadcast':
                    if (msg.action === 'move' || msg.action === 'pass') {
                        // 对方走子：直接更新状态
                        board = msg.board;
                        unstableInfo = msg.unstableInfo;
                        moveCount = msg.moveCount;
                        currentPlayer = msg.currentPlayer;
                        if (msg.historyStates) {
                            historyStates = msg.historyStates;
                        }
                        lastMoveMarkers = msg.lastMoveMarkers || [];
                        // 重建 bornAtMove
                        bornAtMove = [];
                        for (let r = 0; r < BOARD_SIZE; r++) {
                            for (let c = 0; c < BOARD_SIZE; c++) {
                                if (unstableInfo[r][c] !== 0) {
                                    bornAtMove[unstableInfo[r][c]] = [r, c];
                                }
                            }
                        }
                        if (showEstimateActive) {
                            cachedLiveBoard = removeDeadAndDying(board);
                            cachedTerritory = assignTerritoryWithRange(cachedLiveBoard);
                        }
                        drawBoardWithOverlay();
                        updateTurn();
                    } else if (msg.action === 'undoAccept') {
                        // 悔棋接受：服务器下发完整历史状态
                        board = msg.board;
                        unstableInfo = msg.unstableInfo;
                        moveCount = msg.moveCount;
                        currentPlayer = msg.currentPlayer;
                        historyStates = msg.historyStates || [];
                        lastMoveMarkers = msg.lastMoveMarkers || [];
                        bornAtMove = [];
                        for (let r = 0; r < BOARD_SIZE; r++) {
                            for (let c = 0; c < BOARD_SIZE; c++) {
                                if (unstableInfo[r][c] !== 0) {
                                    bornAtMove[unstableInfo[r][c]] = [r, c];
                                }
                            }
                        }
                        if (showEstimateActive) {
                            cachedLiveBoard = removeDeadAndDying(board);
                            cachedTerritory = assignTerritoryWithRange(cachedLiveBoard);
                        }
                        drawBoardWithOverlay();
                        updateTurn();
                    } else if (msg.action === 'endAgreed') {
                        let { blackTotal, whiteTotal } = computeScoreFromBoard(board);
                        let lead = blackTotal - whiteTotal - 2 * KOMI;
                        let winner = lead > 0 ? '黑胜' : '白胜';
                        alert(`对局结束！\n黑: ${formatScore(blackTotal)} 白: ${formatScore(whiteTotal)} (贴${KOMI})\n${winner}`);
                    } else if (msg.action === 'resign') {
                        alert(`${msg.player} 认输，对局结束`);
                        lastMoveMarkers = [];
                        drawBoardWithOverlay();
                    }
                    break;
                case 'newGame':
                    // 新局：重置所有状态
                    board = msg.board;
                    unstableInfo = msg.unstableInfo || Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
                    moveCount = msg.moveCount || 0;
                    currentPlayer = msg.currentPlayer || 1;
                    lastMoveMarkers = msg.lastMoveMarkers || [];
                    historyStates = [];
                    bornAtMove = [];
                    myColor = null;
                    radioBlack.checked = false;
                    radioWhite.checked = false;
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    colorStatus.innerText = '未选择阵营';
                    showEstimateActive = false;
                    clearEstimate();
                    drawBoardWithOverlay();
                    updateTurn();
                    break;
                case 'undoRequest':
                    if (confirm('对方请求悔棋，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: false }));
                    }
                    break;
                case 'endRequest':
                    if (confirm('对方申请终局并数点，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: false }));
                    }
                    break;
            }
        }

        function commitMove(row, col) {
            if (!isMyTurn) return false;
            // 落子合法性由 tryPlaceStone 内部判断
            if (tryPlaceStone(row, col)) {
                // 发送给服务器
                ws.send(JSON.stringify({
                    type: 'move',
                    board: board,
                    unstableInfo: unstableInfo,
                    moveCount: moveCount,
                    nextPlayer: currentPlayer,
                    lastMoveMarkers: lastMoveMarkers
                }));
                updateTurn();
                return true;
            } else {
                alert('落子非法或禁全同');
                return false;
            }
        }

        // ---------- 坐标转换----------
        function getClosestIntersection(x, y) {
            let minDist = Infinity;
            let closestRow = -1, closestCol = -1;
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const ix = PADDING + c * CELL_SIZE;
                    const iy = PADDING + r * CELL_SIZE;
                    const dist = Math.hypot(x - ix, y - iy);
                    if (dist < minDist) {
                        minDist = dist;
                        closestRow = r;
                        closestCol = c;
                    }
                }
            }
            return { row: closestRow, col: closestCol };
        }

        canvas.addEventListener('click', (e) => {
            if (!isMyTurn) return;
            const rect = canvas.getBoundingClientRect();
            const scale = 600 / rect.width;
            const x = (e.clientX - rect.left) * scale;
            const y = (e.clientY - rect.top) * scale;
            const { row, col } = getClosestIntersection(x, y);
            commitMove(row, col);
        });
        if (isMouseDevice) {
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scale = 600 / rect.width;
                const x = (e.clientX - rect.left) * scale;
                const y = (e.clientY - rect.top) * scale;
                const { row, col } = getClosestIntersection(x, y);
                hoverRow = row;
                hoverCol = col;
                isHoverValid = true;
                drawBoardWithOverlay();
            });
            canvas.addEventListener('mouseleave', () => {
                isHoverValid = false;
                hoverRow = -1; hoverCol = -1;
                drawBoardWithOverlay();
            });
        }

        // 按钮事件
        document.getElementById('newGameBtn').addEventListener('click', () => {
            if (confirm('确定开始新的一局吗？')) {
                ws.send(JSON.stringify({ type: 'newGame' }));
            }
        });

        document.getElementById('estimateBtn').addEventListener('click', () => {
            showEstimateActive = !showEstimateActive;
            if (showEstimateActive) {
                showEstimate();
            } else {
                clearEstimate();
            }
        });

        document.getElementById('passBtn').addEventListener('click', () => {
            if (!isMyTurn) return;
            if (pass()) {
                ws.send(JSON.stringify({
                    type: 'pass',
                    board: board,
                    unstableInfo: unstableInfo,
                    moveCount: moveCount,
                    nextPlayer: currentPlayer,
                    lastMoveMarkers: lastMoveMarkers,
                    player: myColor
                }));
                updateTurn();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'undoRequest' }));
        });

        document.getElementById('resignBtn').addEventListener('click', () => {
            if (confirm('确定认输吗？')) ws.send(JSON.stringify({ type: 'resign', player: myColor }));
        });

        document.getElementById('endReqBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'endRequest' }));
        });

        radioBlack.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'black' }));
        });

        radioWhite.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'white' }));
        });

        connectWebSocket();
    </script>
