<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>不稳定围棋</title>
    <style>
        /*[之前的 CSS 保留，并在最后增加以下关于大厅的样式] */
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        body { background: #2b5e3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; padding: 10px; }
        .game-wrapper { background: #d9c8ac; padding: 40px; border-radius: 28px; box-shadow: 0 20px 30px rgba(0,0,0,0.6); border: 2px solid #6b4a2e; width: 100%; max-width: 1200px; margin: 0 auto; }
        .top-panel { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; background: #8f6b4f; padding: 12px 20px; border-radius: 40px; color: #f9eed7; font-weight: bold; margin-bottom: 20px; border-bottom: 4px solid #4d2f1b; gap: 10px; }
        .left-group { display: flex; gap: 30px; align-items: center; flex-wrap: wrap; }
        .side-select { display: flex; gap: 30px; flex-wrap: wrap; }
        .side-select label { font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .side-select input { transform: scale(1.2); margin: 0; }
        .komi-info { background: #3e2e21; padding: 6px 20px; border-radius: 30px; color: #ffd966; font-size: 1rem; white-space: nowrap; }
        .color-status { background: #3e2e21; padding: 6px 16px; border-radius: 30px; color: #ffd966; white-space: nowrap; }
        .main-area { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        .button-panel { display: flex; flex-direction: column; gap: 16px; width: 140px; }
        .ctrl-btn { background: #b88a4b; border: none; color: white; font-weight: bold; padding: 12px 8px; border-radius: 30px; font-size: 1rem; border-bottom: 5px solid #5e3e1e; cursor: pointer; transition: 0.08s; text-align: center; }
        .ctrl-btn:active { border-bottom-width: 2px; transform: translateY(3px); }
        .board-container { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; width: 100%; max-width: 600px; }
        canvas { display: block; background: #deb887; width: 100%; height: auto; aspect-ratio: 1 / 1; border-radius: 4px; box-shadow: inset 0 0 0 1px #6b4a2e, 0 10px 15px #3a2e1e; max-width: 100%; }
        .info-panel { background: #8f6b4f; padding: 20px 16px; border-radius: 20px; color: #efdfbb; width: 100%; max-width: 280px; border: 1px solid #c9a450; margin: 0 auto; min-height: 200px; display: flex; flex-direction: column; margin-bottom: 20px; border-bottom: 4px solid #4d2f1b; }
        .turn-box { background: #3e2e21; padding: 12px; border-radius: 50px; text-align: center; color: #ffd966; font-size: 1.2rem; margin-bottom: 20px; }
        .score-box { background: #3e2e21; padding: 14px; border-radius: 16px; line-height: 1.6; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .score-title { font-size: 1.3rem; margin-bottom: 10px; }
        .score-content { min-height: 60px; }
        @media (max-width: 700px) {
            .game-wrapper { padding: 12px; }
            .button-panel { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; width: 100%; margin: 10px 0 0 0; gap: 10px; }
            .button-panel .ctrl-btn { width: calc(50% - 10px); min-width: 120px; }
            .info-panel { max-width: 100%; margin-top: 10px; }
            .top-panel { padding: 10px 12px; }
            .left-group { gap: 15px; }
            .side-select label { font-size: 0.95rem; }
            .komi-info { white-space: normal; font-size: 0.9rem; }
            .color-status { white-space: normal; font-size: 0.9rem; }
            .board-container { max-width: 100%; }
        }
        .touch-device .mobile-actions { display: none; }

        /* 【新增】大厅界面样式 */
        #roomUI {
            display: flex; flex-direction: column; gap: 15px; background: #d9c8ac; padding: 40px;
            border-radius: 28px; box-shadow: 0 20px 30px rgba(0,0,0,0.6); border: 2px solid #6b4a2e;
            width: 90%; max-width: 400px; margin: auto; text-align: center;
        }
        #roomUI input {
            padding: 12px; font-size: 1rem; border-radius: 8px; border: 2px solid #8f6b4f; width: 100%; box-sizing: border-box; background: #f9eed7;
        }
        .sys-status { color: #5e3e1e; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <!-- 【新增】加入房间的 UI -->
    <div id="roomUI">
        <h2 style="color:#4d2f1b; margin-top:0;">进入房间</h2>
        <div class="sys-status" id="sysStatus">正在连接服务器...</div>
        <input type="text" id="roomIdInput" placeholder="输入房间号 (必填)" disabled>
        <input type="password" id="roomPwdInput" placeholder="输入密码 (无密码可留空)" disabled>
        <button id="joinRoomBtn" class="ctrl-btn" style="width: 100%; margin-top: 10px;" disabled>加入 / 创建房间</button>
    </div>

    <!-- 原始 UI 移入 gameUI 并在初始时隐藏 -->
    <div id="gameUI" class="game-wrapper" style="display: none;">
        <div class="top-panel">
            <div class="left-group">
                <div class="side-select">
                    <label style="color: #b1d1fc;"><input type="radio" name="color" value="black" id="radioBlack"> ⚫ 黑方</label>
                    <label style="color: #ffeeaa;"><input type="radio" name="color" value="white" id="radioWhite"> ⚪ 白方</label>
                </div>
                <div class="komi-info">黑贴白3.25点</div>
            </div>
            <div class="color-status" id="colorStatus">未选择阵营</div>
            <!-- 可以增加一个当前房间显示的区域 -->
            <div class="color-status" id="roomDisplay" style="background:#5e3e1e;">房间: -</div>
        </div>

        <div class="main-area">
            <div class="button-panel">
                <button class="ctrl-btn" id="newGameBtn">🔄 新局</button>
                <button class="ctrl-btn" id="estimateBtn">📊 形势判断</button>
                <button class="ctrl-btn" id="passBtn">🚫 虚着</button>
                <button class="ctrl-btn" id="undoBtn">↩ 悔棋</button>
                <button class="ctrl-btn" id="resignBtn">🏳 认输</button>
                <button class="ctrl-btn" id="endReqBtn">⏹ 申请终局</button>
                <button class="ctrl-btn" id="leaveRoomBtn" style="background:#8c3c3c;">🔙 离开房间</button>
            </div>

            <div class="board-container">
                <canvas id="goBoard" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="turn-box" id="turnDisplay"></div>
                <div class="score-box">
                    <div class="score-title" id="scoreTitle">　</div>
                    <div class="score-content">
                        <div id="scoreBoard">　</div>
                        <div id="leadInfo" style="margin-top:12px; color: #ffb870;">　</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PADDING = 25;
        const BOARD_SIZE = 19;
        const KOMI = 3.25;
        const CELL_SIZE = (600 - 2 * PADDING) / (BOARD_SIZE - 1);
        const UNSTABLE_LIFETIME = 40;

        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isMouseDevice = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        document.body.classList.add(isTouchDevice ? 'touch-device' : 'no-touch');

        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let unstableInfo = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let moveCount = 0;
        let bornAtMove =[];

        let currentPlayer = 1;
        let myColor = null;
        let isMyTurn = false;
        let currentRoomId = null;

        let hoverRow = -1, hoverCol = -1;
        let isHoverValid = false;

        let historyStates = [];
        let lastMoveMarkers =[];
        let showEstimateActive = false;
        let cachedLiveBoard = null;
        let cachedTerritory = null;

        let ws;

        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turnDisplay');
        const colorStatus = document.getElementById('colorStatus');
        const roomDisplay = document.getElementById('roomDisplay');
        const radioBlack = document.getElementById('radioBlack');
        const radioWhite = document.getElementById('radioWhite');
        const scoreTitle = document.getElementById('scoreTitle');
        const scoreBoard = document.getElementById('scoreBoard');
        const leadInfo = document.getElementById('leadInfo');

        // UI 元素
        const roomUI = document.getElementById('roomUI');
        const gameUI = document.getElementById('gameUI');
        const sysStatus = document.getElementById('sysStatus');
        const roomIdInput = document.getElementById('roomIdInput');
        const roomPwdInput = document.getElementById('roomPwdInput');
        const joinRoomBtn = document.getElementById('joinRoomBtn');

        function formatScore(num) {
            let str = num.toFixed(2);
            str = str.replace(/\.?0+$/, '');
            return str;
        }

        //[ 此处保留原逻辑中未修改的方法: copyState, restoreState, stateToString, isRepeatBoard, removeGroup, hasLiberty, tryPlaceStone, pass, drawBoard, isLibertySurroundedByOpponent, removeDeadAndDying, assignTerritoryWithRange, computeScore, computeScoreFromBoard, drawEstimateOverlay, drawBoardWithOverlay, showEstimate, clearEstimate, updateTurn, commitMove, getClosestIntersection 等函数的内容，保持不变 ]
        
        // --- 为节省长度，假装上方有原本那些纯逻辑辅助函数的完整代码 ---
        // (在实际工程中，请把你原本在 index.html 里的纯计算函数放回这里)
        // ... ...
        // [原先的 JS 函数，不涉及网络通信的部分均不需改动]

        // --- 以下是必须提供的实现 ---
        function copyState() { return { board: board.map(row => row.slice()), unstableInfo: unstableInfo.map(row => row.slice()), moveCount: moveCount, lastMoveMarkers: lastMoveMarkers.map(m => ({...m})) }; }
        function restoreState(state) { board = state.board.map(row => row.slice()); unstableInfo = state.unstableInfo.map(row => row.slice()); moveCount = state.moveCount; lastMoveMarkers = state.lastMoveMarkers.map(m => ({...m})); }
        function stateToString(b, u) { let rows =[]; for (let r = 0; r < BOARD_SIZE; r++) { let row =[]; for (let c = 0; c < BOARD_SIZE; c++) { if (b[r][c] === 0) row.push('0'); else row.push((b[r][c] === 1 ? 'B' : 'W') + (u[r][c] === 0 ? 'S' : 'U' + u[r][c])); } rows.push(row.join(',')); } return rows.join(';'); }
        function isRepeatBoard(newBoard, newUnstableInfo) { let newStr = stateToString(newBoard, newUnstableInfo); return historyStates.some(state => stateToString(state.board, state.unstableInfo) === newStr); }
        function removeGroup(b, u, row, col, color) { let queue = [[row, col]]; b[row][col] = 0; u[row][col] = 0; while (queue.length) { let [r, c] = queue.shift(); [[-1, 0], [1, 0], [0, -1], [0, 1]].forEach(([dr, dc]) => { let nr = r + dr, nc = c + dc; if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === color) { b[nr][nc] = 0; u[nr][nc] = 0; queue.push([nr, nc]); }});}}
        function hasLiberty(b, row, col) { let color = b[row][col]; if (color === 0) return false; let visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false)); let queue = [[row, col]]; visited[row][col] = true; while (queue.length) { let [r, c] = queue.shift(); for (let [dr, dc] of [[-1, 0],[1, 0], [0, -1], [0, 1]]) { let nr = r + dr, nc = c + dc; if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue; if (b[nr][nc] === 0) return true; if (b[nr][nc] === color && !visited[nr][nc]) { visited[nr][nc] = true; queue.push([nr, nc]); }}} return false; }
        
        function tryPlaceStone(row, col) {
            if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return false;
            const playerVal = myColor === 'black' ? 1 : 2;
            if (board[row][col] !== 0) { if (unstableInfo[row][col] === 0) return false; if (board[row][col] !== playerVal) return false; }
            let currentState = copyState(); historyStates.push(currentState);
            let newMoveCount = moveCount + 1;
            let wasUnstable = (unstableInfo[row][col] !== 0);
            if (wasUnstable) {
                let born = unstableInfo[row][col];
                if (bornAtMove[born] && bornAtMove[born][0] === row && bornAtMove[born][1] === col) bornAtMove[born] = null;
                board[row][col] = 0; unstableInfo[row][col] = 0;
            }
            board[row][col] = playerVal;
            if (!wasUnstable) { unstableInfo[row][col] = newMoveCount; bornAtMove[newMoveCount] = [row, col]; } else { unstableInfo[row][col] = 0; }
            for (let i = 0; i < BOARD_SIZE; i++) for (let j = 0; j < BOARD_SIZE; j++) if (board[i][j] === 3 - playerVal && !hasLiberty(board, i, j)) removeGroup(board, unstableInfo, i, j, 3 - playerVal);
            for (let i = 0; i < BOARD_SIZE; i++) for (let j = 0; j < BOARD_SIZE; j++) if (board[i][j] === playerVal && !hasLiberty(board, i, j)) removeGroup(board, unstableInfo, i, j, playerVal);
            let toDieBorn = newMoveCount - UNSTABLE_LIFETIME;
            if (toDieBorn >= 0 && bornAtMove[toDieBorn]) { let [r, c] = bornAtMove[toDieBorn]; if (r !== undefined && board[r][c] !== 0 && unstableInfo[r][c] === toDieBorn) { board[r][c] = 0; unstableInfo[r][c] = 0; bornAtMove[toDieBorn] = null; } }
            moveCount = newMoveCount; currentPlayer = currentPlayer === 1 ? 2 : 1; lastMoveMarkers = [{ row, col, color: playerVal }];
            if (isRepeatBoard(board, unstableInfo)) { restoreState(currentState); historyStates.pop(); return false; }
            return true;
        }

        function pass() {
            let currentState = copyState(); historyStates.push(currentState); moveCount++; currentPlayer = currentPlayer === 1 ? 2 : 1; lastMoveMarkers =[];
            let toDieBorn = moveCount - UNSTABLE_LIFETIME;
            if (toDieBorn >= 0 && bornAtMove[toDieBorn]) { let [r, c] = bornAtMove[toDieBorn]; if (r !== undefined && board[r][c] !== 0 && unstableInfo[r][c] === toDieBorn) { board[r][c] = 0; unstableInfo[r][c] = 0; bornAtMove[toDieBorn] = null; } }
            return true;
        }

        // --- 画布与渲染（直接取原版） ---
        function drawBoard() {
            ctx.clearRect(0, 0, 600, 600); const cellSize = CELL_SIZE; ctx.lineWidth = 1.5; ctx.strokeStyle = '#3a281c';
            for (let i = 0; i < BOARD_SIZE; i++) { ctx.beginPath(); ctx.moveTo(PADDING + i * cellSize, PADDING); ctx.lineTo(PADDING + i * cellSize, 600 - PADDING); ctx.stroke(); ctx.moveTo(PADDING, PADDING + i * cellSize); ctx.lineTo(600 - PADDING, PADDING + i * cellSize); ctx.stroke(); }
            const stars = [3, 9, 15]; ctx.fillStyle = '#3a281c'; stars.forEach(r => stars.forEach(c => { ctx.beginPath(); ctx.arc(PADDING + c * cellSize, PADDING + r * cellSize, cellSize * 0.12, 0, 2 * Math.PI); ctx.fill(); }));
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) continue;
                    const x = PADDING + c * cellSize, y = PADDING + r * cellSize, radius = cellSize * 0.44;
                    ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowOffsetY = 2;
                    const gradient = ctx.createRadialGradient(x - 3, y - 3, radius * 0.2, x, y, radius * 1.2);
                    if (board[r][c] === 1) { gradient.addColorStop(0, '#444'); gradient.addColorStop(0.6, '#222'); gradient.addColorStop(1, '#111'); } else { gradient.addColorStop(0, '#fff'); gradient.addColorStop(0.5, '#eee'); gradient.addColorStop(1, '#aaa'); }
                    ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI); ctx.fillStyle = gradient; ctx.fill();
                    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.beginPath(); ctx.arc(x - 3, y - 3, radius * 0.15, 0, 2 * Math.PI); ctx.fillStyle = board[r][c] === 1 ? '#444' : '#fff'; ctx.fill();
                    if (unstableInfo[r][c] !== 0) {
                        let remaining = unstableInfo[r][c] + UNSTABLE_LIFETIME - moveCount;
                        ctx.strokeStyle = remaining < 5 ? '#ff0000' : (board[r][c] === 1 ? '#ff9900' : '#0099ff');
                        ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(x, y, radius + 1, 0, 2 * Math.PI); ctx.stroke();
                        ctx.font = 'bold 10px Arial'; ctx.textBaseline = 'top'; ctx.fillStyle = ctx.strokeStyle; ctx.fillText(remaining, x - radius + 10, y - radius + 4);
                    }
                }
            }
            const markLen = cellSize * 0.352;
            lastMoveMarkers.forEach(({ row, col, color }) => { const x = PADDING + col * cellSize, y = PADDING + row * cellSize; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + markLen, y); ctx.lineTo(x, y + markLen); ctx.closePath(); ctx.fillStyle = color === 1 ? '#ffffff' : (color === 2 ? '#222222' : '#ff4444'); ctx.fill(); });
            ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#3a281c'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let c = 0; c < BOARD_SIZE; c++) ctx.fillText(String.fromCharCode(65 + c), PADDING + c * cellSize, 0.6 * PADDING);
            for (let r = 0; r < BOARD_SIZE; r++) ctx.fillText((r + 1).toString(), PADDING / 2, PADDING + r * cellSize);
            if (isMyTurn && isHoverValid && hoverRow >= 0 && hoverCol >= 0) {
                let hoverVal = myColor === 'black' ? 1 : 2;
                if (board[hoverRow][hoverCol] === 0 || (unstableInfo[hoverRow][hoverCol] !== 0 && board[hoverRow][hoverCol] === hoverVal)) { ctx.globalAlpha = 0.45; ctx.beginPath(); ctx.arc(PADDING + hoverCol * cellSize, PADDING + hoverRow * cellSize, cellSize * 0.44, 0, 2 * Math.PI); ctx.fillStyle = myColor === 'black' ? '#222' : '#ddd'; ctx.fill(); ctx.globalAlpha = 1.0; }
            }
        }

        // 形势判断部分保持原样省略（使用原本自带的方法即可）
        function isLibertySurroundedByOpponent(board, libertyRow, libertyCol, opponentColor) { const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]]; for (let [dr, dc] of dirs) { let nr = libertyRow + dr, nc = libertyCol + dc; if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === opponentColor) return true; } return false; }
        function removeDeadAndDying(srcBoard) { let boardCopy = srcBoard.map(row => row.slice()); let changed = true; while (changed) { changed = false; let visited = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false)); for (let r = 0; r < BOARD_SIZE; r++) { for (let c = 0; c < BOARD_SIZE; c++) { if (boardCopy[r][c] !== 0 && !visited[r][c]) { let color = boardCopy[r][c]; let queue = [[r, c]]; visited[r][c] = true; let stones = [[r, c]]; let liberties = new Set(); let idx = 0; while (idx < queue.length) { let [rr, cc] = queue[idx++]; for (let [dr, dc] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) { let nr = rr + dr, nc = cc + dc; if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue; if (boardCopy[nr][nc] === 0) liberties.add(nr + ',' + nc); else if (boardCopy[nr][nc] === color && !visited[nr][nc]) { visited[nr][nc] = true; queue.push([nr, nc]); stones.push([nr, nc]); } } } if (liberties.size === 0) { for (let [rr, cc] of stones) boardCopy[rr][cc] = 0; changed = true; continue; } if (liberties.size <= 2) { let allLibertiesControlled = true; for (let lib of liberties) { let [lr, lc] = lib.split(',').map(Number); if (!isLibertySurroundedByOpponent(boardCopy, lr, lc, 3 - color)) { allLibertiesControlled = false; break; } } if (allLibertiesControlled) { for (let [rr, cc] of stones) boardCopy[rr][cc] = 0; changed = true; } } } } } } return boardCopy; }
        function assignTerritoryWithRange(liveBoard) { let blackStones = [], whiteStones =[]; for (let r = 0; r < BOARD_SIZE; r++) for (let c = 0; c < BOARD_SIZE; c++) { if (liveBoard[r][c] === 1) blackStones.push([r, c]); else if (liveBoard[r][c] === 2) whiteStones.push([r, c]); } let territory = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0)); for (let r = 0; r < BOARD_SIZE; r++) { for (let c = 0; c < BOARD_SIZE; c++) { if (liveBoard[r][c] !== 0) continue; let minDistBlack = Infinity, minDistWhite = Infinity; for (let [br, bc] of blackStones) { let dist = Math.abs(r - br) + Math.abs(c - bc); if (dist < minDistBlack) minDistBlack = dist; } for (let [wr, wc] of whiteStones) { let dist = Math.abs(r - wr) + Math.abs(c - wc); if (dist < minDistWhite) minDistWhite = dist; } let range = (r <= 1 || r >= BOARD_SIZE - 2 || c <= 1 || c >= BOARD_SIZE - 2) ? 5 : 4; let blackInRange = minDistBlack <= range, whiteInRange = minDistWhite <= range; if (!blackInRange && !whiteInRange) territory[r][c] = 3; else if (blackInRange && !whiteInRange) territory[r][c] = 1; else if (!blackInRange && whiteInRange) territory[r][c] = 2; else { if (minDistBlack < minDistWhite) territory[r][c] = 1; else if (minDistWhite < minDistBlack) territory[r][c] = 2; else territory[r][c] = 3; } } } return territory; }
        function computeScore(liveBoard, territory) { let blackStones = 0, whiteStones = 0, blackTerritory = 0, whiteTerritory = 0, publicTerritory = 0; for (let r = 0; r < BOARD_SIZE; r++) { for (let c = 0; c < BOARD_SIZE; c++) { if (liveBoard[r][c] === 1) blackStones++; else if (liveBoard[r][c] === 2) whiteStones++; else { if (territory[r][c] === 1) blackTerritory++; else if (territory[r][c] === 2) whiteTerritory++; else if (territory[r][c] === 3) publicTerritory++; } } } return { blackTotal: blackStones + blackTerritory + publicTerritory / 2, whiteTotal: whiteStones + whiteTerritory + publicTerritory / 2 }; }
        function computeScoreFromBoard(srcBoard) { let liveBoard = removeDeadAndDying(srcBoard); let territory = assignTerritoryWithRange(liveBoard); return computeScore(liveBoard, territory); }
        function drawEstimateOverlay(liveBoard, territory) { const dotRadius = CELL_SIZE * 0.18; for (let r = 0; r < BOARD_SIZE; r++) { for (let c = 0; c < BOARD_SIZE; c++) { if (board[r][c] !== 0 && liveBoard[r][c] === 0) { ctx.fillStyle = board[r][c] === 1 ? '#ffffff' : '#222222'; ctx.fillRect(PADDING + c * CELL_SIZE - dotRadius, PADDING + r * CELL_SIZE - dotRadius, dotRadius * 2, dotRadius * 2); } } } for (let r = 0; r < BOARD_SIZE; r++) { for (let c = 0; c < BOARD_SIZE; c++) { if (board[r][c] !== 0) continue; let owner = territory[r][c]; if (owner === 0 || owner === 3) continue; ctx.fillStyle = owner === 1 ? '#222' : '#f0f0f0'; ctx.fillRect(PADDING + c * CELL_SIZE - dotRadius, PADDING + r * CELL_SIZE - dotRadius, dotRadius * 2, dotRadius * 2); } } }
        function drawBoardWithOverlay() { drawBoard(); if (showEstimateActive && cachedLiveBoard && cachedTerritory) drawEstimateOverlay(cachedLiveBoard, cachedTerritory); }
        function showEstimate() { if (!showEstimateActive) { clearEstimate(); return; } cachedLiveBoard = removeDeadAndDying(board); cachedTerritory = assignTerritoryWithRange(cachedLiveBoard); let { blackTotal, whiteTotal } = computeScore(cachedLiveBoard, cachedTerritory); let lead = blackTotal - whiteTotal - 2 * KOMI; scoreTitle.innerText = '🏆 形势'; scoreBoard.innerText = `黑: ${formatScore(blackTotal)} | 白: ${formatScore(whiteTotal)}`; leadInfo.innerText = `黑${(lead >= 0 ? '+' : '') + formatScore(lead)}点`; drawBoardWithOverlay(); }
        function clearEstimate() { cachedLiveBoard = null; cachedTerritory = null; scoreTitle.innerText = '　'; scoreBoard.innerText = '　'; leadInfo.innerText = '　'; drawBoard(); }
        function updateTurn() { let totalHand = moveCount + 1; turnDisplay.innerText = currentPlayer === 1 ? '⚫ 第' + totalHand + '手' : '⚪ 第' + totalHand + '手'; isMyTurn = (myColor === 'black' && currentPlayer === 1) || (myColor === 'white' && currentPlayer === 2); drawBoardWithOverlay(); }

        function commitMove(row, col) {
            if (!isMyTurn) return false;
            if (tryPlaceStone(row, col)) {
                ws.send(JSON.stringify({ type: 'move', board: board, unstableInfo: unstableInfo, moveCount: moveCount, nextPlayer: currentPlayer, lastMoveMarkers: lastMoveMarkers }));
                updateTurn();
                return true;
            } else {
                alert('落子非法或禁全同');
                return false;
            }
        }

        function getClosestIntersection(x, y) { let minDist = Infinity, closestRow = -1, closestCol = -1; for (let r = 0; r < BOARD_SIZE; r++) { for (let c = 0; c < BOARD_SIZE; c++) { const dist = Math.hypot(x - (PADDING + c * CELL_SIZE), y - (PADDING + r * CELL_SIZE)); if (dist < minDist) { minDist = dist; closestRow = r; closestCol = c; } } } return { row: closestRow, col: closestCol }; }


        // ---------- WebSocket 网络通信重构 ----------
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/unstable-weiqi`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                sysStatus.innerText = '连接成功！请输入房间信息';
                sysStatus.style.color = '#1e5e3b';
                roomIdInput.disabled = false;
                roomPwdInput.disabled = false;
                joinRoomBtn.disabled = false;
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };
            ws.onclose = () => {
                sysStatus.innerText = '连接断开，重连中...';
                sysStatus.style.color = '#8c3c3c';
                roomIdInput.disabled = true;
                roomPwdInput.disabled = true;
                joinRoomBtn.disabled = true;
                // 如果在房间内意外断开，回到大厅
                roomUI.style.display = 'flex';
                gameUI.style.display = 'none';
                setTimeout(connectWebSocket, 2000);
            };
        }

        function rebuildBornAtMove() {
            bornAtMove =[];
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (unstableInfo[r][c] !== 0) {
                        bornAtMove[unstableInfo[r][c]] =[r, c];
                    }
                }
            }
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'roomError':
                    alert(msg.message);
                    break;
                case 'roomJoined':
                    // 【新增】进入房间时的全量同步与 UI 切换
                    currentRoomId = msg.roomId;
                    roomUI.style.display = 'none';
                    gameUI.style.display = 'block';
                    roomDisplay.innerText = `房间: ${currentRoomId}`;
                    
                    const state = msg.gameState;
                    board = state.board;
                    unstableInfo = state.unstableInfo;
                    moveCount = state.moveCount;
                    currentPlayer = state.currentPlayer;
                    historyStates = state.historyStates || [];
                    lastMoveMarkers = state.lastMoveMarkers ||[];
                    rebuildBornAtMove();
                    
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    radioBlack.checked = false;
                    radioWhite.checked = false;
                    myColor = null;
                    colorStatus.innerText = '未选择阵营';

                    drawBoardWithOverlay();
                    updateTurn();
                    break;

                case 'init':
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    // 如果自己颜色被别人顶替或重置
                    if (msg.blackTaken === false && myColor === 'black') {
                        myColor = null; radioBlack.checked = false; colorStatus.innerText = '未选择阵营';
                    }
                    if (msg.whiteTaken === false && myColor === 'white') {
                        myColor = null; radioWhite.checked = false; colorStatus.innerText = '未选择阵营';
                    }
                    updateTurn();
                    break;
                case 'colorAssigned':
                    myColor = msg.color;
                    colorStatus.innerText = `已选择: ${myColor === 'black' ? '黑方' : '白方'}`;
                    if (myColor === 'black') radioBlack.checked = true;
                    else radioWhite.checked = true;
                    updateTurn();
                    break;
                case 'colorTaken':
                    alert('该颜色已被占用');
                    break;
                case 'broadcast':
                    if (msg.action === 'move' || msg.action === 'pass' || msg.action === 'undoAccept') {
                        board = msg.board;
                        unstableInfo = msg.unstableInfo;
                        moveCount = msg.moveCount;
                        currentPlayer = msg.currentPlayer;
                        if (msg.historyStates) historyStates = msg.historyStates;
                        lastMoveMarkers = msg.lastMoveMarkers ||[];
                        rebuildBornAtMove();
                        if (showEstimateActive) {
                            cachedLiveBoard = removeDeadAndDying(board);
                            cachedTerritory = assignTerritoryWithRange(cachedLiveBoard);
                        }
                        drawBoardWithOverlay();
                        updateTurn();
                    } else if (msg.action === 'endAgreed') {
                        let { blackTotal, whiteTotal } = computeScoreFromBoard(board);
                        let lead = blackTotal - whiteTotal - 2 * KOMI;
                        let winner = lead > 0 ? '黑胜' : '白胜';
                        alert(`对局结束！\n黑: ${formatScore(blackTotal)} 白: ${formatScore(whiteTotal)} (贴${KOMI})\n${winner}`);
                    } else if (msg.action === 'resign') {
                        alert(`${msg.player} 认输，对局结束`);
                        lastMoveMarkers =[];
                        drawBoardWithOverlay();
                    }
                    break;
                case 'newGame':
                    board = msg.board;
                    unstableInfo = msg.unstableInfo || Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
                    moveCount = msg.moveCount || 0;
                    currentPlayer = msg.currentPlayer || 1;
                    lastMoveMarkers = msg.lastMoveMarkers ||[];
                    historyStates = [];
                    bornAtMove = [];
                    myColor = null;
                    radioBlack.checked = false;
                    radioWhite.checked = false;
                    radioBlack.disabled = msg.blackTaken;
                    radioWhite.disabled = msg.whiteTaken;
                    colorStatus.innerText = '未选择阵营';
                    showEstimateActive = false;
                    clearEstimate();
                    drawBoardWithOverlay();
                    updateTurn();
                    break;
                case 'undoRequest':
                    if (confirm('对方请求悔棋，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'undoResponse', accept: false }));
                    }
                    break;
                case 'endRequest':
                    if (confirm('对方申请终局并数点，是否同意？')) {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: true }));
                    } else {
                        ws.send(JSON.stringify({ type: 'endResponse', accept: false }));
                    }
                    break;
            }
        } // handleMessage 结束

        // ---------- 交互事件绑定 ----------

        // 画布点击（落子）
        canvas.addEventListener('click', (e) => {
            if (!isMyTurn) return;
            const rect = canvas.getBoundingClientRect();
            const scale = 600 / rect.width;
            const x = (e.clientX - rect.left) * scale;
            const y = (e.clientY - rect.top) * scale;
            const { row, col } = getClosestIntersection(x, y);
            commitMove(row, col);
        });

        // 鼠标悬停（落子预览）
        if (isMouseDevice) {
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scale = 600 / rect.width;
                const x = (e.clientX - rect.left) * scale;
                const y = (e.clientY - rect.top) * scale;
                const { row, col } = getClosestIntersection(x, y);
                hoverRow = row;
                hoverCol = col;
                isHoverValid = true;
                drawBoardWithOverlay();
            });
            canvas.addEventListener('mouseleave', () => {
                isHoverValid = false;
                hoverRow = -1; hoverCol = -1;
                drawBoardWithOverlay();
            });
        }

        // --- 大厅及房间控制按钮 ---
        joinRoomBtn.addEventListener('click', () => {
            const roomId = roomIdInput.value.trim();
            const pwd = roomPwdInput.value;
            if (!roomId) {
                alert('房间号不能为空');
                return;
            }
            ws.send(JSON.stringify({ type: 'joinRoom', roomId: roomId, password: pwd }));
        });

        document.getElementById('leaveRoomBtn').addEventListener('click', () => {
            if (confirm('确定要离开房间并返回大厅吗？')) {
                // 最简单且状态最干净的退房方式：刷新页面，断开连接并重置一切前端状态
                window.location.reload();
            }
        });

        // --- 原版游戏功能按钮 ---
        document.getElementById('newGameBtn').addEventListener('click', () => {
            if (confirm('确定开始新的一局吗？')) {
                ws.send(JSON.stringify({ type: 'newGame' }));
            }
        });

        document.getElementById('estimateBtn').addEventListener('click', () => {
            showEstimateActive = !showEstimateActive;
            if (showEstimateActive) {
                showEstimate();
            } else {
                clearEstimate();
            }
        });

        document.getElementById('passBtn').addEventListener('click', () => {
            if (!isMyTurn) return;
            if (pass()) {
                ws.send(JSON.stringify({
                    type: 'pass',
                    board: board,
                    unstableInfo: unstableInfo,
                    moveCount: moveCount,
                    nextPlayer: currentPlayer,
                    lastMoveMarkers: lastMoveMarkers,
                    player: myColor
                }));
                updateTurn();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'undoRequest' }));
        });

        document.getElementById('resignBtn').addEventListener('click', () => {
            if (confirm('确定认输吗？')) ws.send(JSON.stringify({ type: 'resign', player: myColor }));
        });

        document.getElementById('endReqBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: 'endRequest' }));
        });

        radioBlack.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'black' }));
        });

        radioWhite.addEventListener('change', function () {
            if (this.checked && !this.disabled) ws.send(JSON.stringify({ type: 'selectColor', color: 'white' }));
        });

        // 启动 WebSocket 连接
        connectWebSocket();
    </script>
</body>
</html>
